const SCENE1_INTRO_TEXT =
  '苏静山洞的历史原型是女地下工作者苏静（化名）的真实事迹。1943 年冬，她被委派到平西情报联络站负责新建电台的工作，以加强平津地下情报的联络。' +

const HIDDEN_CHAPTER_TEXT =
  '苏静是平西情报联络站秘密电台负责人的化名。1943 年冬天，为使平津地下情报联络畅通，上级决定在妙峰山涧沟村建立一处隐蔽电台，苏静被派往这里负责电台收发报工作。\n\n' +
  '【假扮夫妻的掩护】\n' +
  '为了绝对保密和便于开展工作，苏静与房东的儿子假扮成夫妻。每天早晨她跟"婆婆"一起做饭，白天与"家人"一起下地干农活，而到了晚上，则独自钻进村外的山洞里秘密收发情报。\n\n' +
  '【山洞发报的艰苦岁月】\n' +
  '真正的发报地点设在村外一个空间极为狭小、人无法站直的山洞里。每到收发电报时间，苏静就以砍柴或下地为名钻进山洞，仅靠一盏煤油灯的光亮，在几块石板垒成的"桌子"上操作电台。山洞里阴暗潮湿，冬天后背顶着寒霜，夏天滴水不断，无论寒冬酷暑、风霜雨雪，她数年如一日，一直坚持到解放战争胜利。\n\n' +
  '【"苏静"的真实身份】\n' +
  '平西情报联络站运营负责人闫玮曾透露："苏静同志其实是一个化名，当时在隐蔽战线有很多同志们其实都是化名的，真实的姓名和事迹不为人所知。"这正是隐蔽战线工作者的常态——许多人在工作中使用化名，真实姓名和生平至今无从考证。\n\n' +
  '【影视作品原型辨析】\n' +
  '关于苏静是否为《潜伏》原型，存在两种说法。有资料认为苏静是电视剧《潜伏》中"假扮夫妻"情节的原型——1943 年冬天，苏静与户主的儿子假扮成夫妻，白天一起生活，晚上则独自在山洞中秘密发电报。但也有资料明确指出，《潜伏》中翠萍的人物原型是王凤岐。王凤岐曾是游击队长，枪法准，组织安排她从河北易县假装王文的妻子来到北平城，掩护王文执行秘密发报工作。与电视剧中"翠萍"初到城里闹笑话不同，真实的王凤岐"很聪明"，记忆力好，上级交代的任务重复几遍就能记住，不用纸笔让情报更加安全。而《潜伏》中余则成的原型之一，则是王文。他是一名红军战士，1938 年被派往莫斯科学习无线电通讯和情报工作，回国后先后被派往北平、上海担任秘密电台台长，长期从事情报工作。王文与王凤岐见面二十多天后秘密举行了婚礼，由"假夫妻"成了"真爱人"，一直恩爱到老。\n\n' +

function pickMaleVoice(vs) {
  return vs.find(v => /kangkang|yunxi|yunjian|yunfeng|liang|男|male/i.test(v.name))
    || vs.find(v => !/huihui|xiaoxiao|yaoyao|xiao|晓|女|female/i.test(v.name))
    || vs[0];
}

function pickFemaleVoice(vs) {
  const male = pickMaleVoice(vs);
  return vs.find(v => /huihui|xiaoxiao|yaoyao|晓|女|female/i.test(v.name))
    || vs.find(v => v !== male)
    || vs[0];
}

}

function clearDialogueBubbleTimer() {

  }
  if (dialogueBubblePollId) {
    clearInterval(dialogueBubblePollId);
    dialogueBubblePollId = null;
  }
}

function scheduleInAudioDialogueBubble(dialogue, dialogueAt) {
  clearDialogueBubbleTimer();
  if (!dialogue) return;
  const key = dialogue.speaker === 'mother' ? 'mother' : dialogue.speaker;
  if (!key || key === 'radio') return;
  let shown = false;
  const show = () => {
    if (shown) return;
    shown = true;
    clearDialogueBubbleTimer();
    if (activeNarrationAudio) activeNarrationAudio.removeEventListener('timeupdate', onTime);
    if (!actors[key]) return;
    showSpeechBubble(key, dialogue.name, dialogue.text);
    document.getElementById('miniDialogue').textContent = dialogue.name + '："' + dialogue.text + '"';
  };
  const onTime = () => {
    const audio = activeNarrationAudio;
    if (audio && audio.currentTime >= dialogueAt) show();
  };
  const audio = activeNarrationAudio;
  const arm = () => {
    const at = typeof dialogueAt === 'number' ? dialogueAt : NaN;
    if (!isFinite(at) || at < 0) {
      const dur = audio && isFinite(audio.duration) ? audio.duration : 0;
      dialogueBubbleTimer = setTimeout(show, dur > 0 ? Math.max(500, dur * 1000 * 0.7) : 8000);
      return;
    }
    audio.addEventListener('timeupdate', onTime);
    dialogueBubblePollId = setInterval(() => {
      const a = activeNarrationAudio;
      if (a && a.currentTime >= at) show();
    }, 30);
  };
  if (audio) {
    if (isFinite(audio.duration) && audio.duration > 0) arm();
    else audio.addEventListener('loadedmetadata', arm, { once: true });
  }
}

function playDocAudio(key, textFallback, onEnd) {
  if (!audioOn) { if (onEnd) onEnd(); return; }
  const src = NARRATION_MP3[key];
  if (!src) {
    tts(textFallback, 'narrator', onEnd);
    return;
  }
  speechSynthesis.cancel();
  stopNarrationAudio();
  let audio = narrationMp3Cache[key];
  if (!audio) {
    audio = new Audio(src);
    audio.preload = 'auto';
    narrationMp3Cache[key] = audio;
  } else {
    audio.pause();
    audio.currentTime = 0;
  }
  activeNarrationAudio = audio;
  let playbackStarted = false;
  const onPlaying = () => { playbackStarted = true; };
  const cleanup = () => {
    audio.removeEventListener('ended', onDone);
    audio.removeEventListener('error', onFail);
    audio.removeEventListener('playing', onPlaying);
  };
  const onDone = () => {
    cleanup();
    if (activeNarrationAudio === audio) activeNarrationAudio = null;
    if (onEnd) onEnd();
  };
  const onFail = () => {
    cleanup();
    if (activeNarrationAudio === audio) activeNarrationAudio = null;
    if (playbackStarted) {
      if (onEnd) onEnd();
      return;
    }
    tts(textFallback, 'narrator', onEnd);
  };
  audio.addEventListener('playing', onPlaying, { once: true });
  audio.addEventListener('ended', onDone);
  audio.addEventListener('error', onFail);
  audio.play().catch(onFail);
}

function tts(text, role, onEnd) {
  if (!audioOn || !text) { if (onEnd) onEnd(); return; }
  speechSynthesis.cancel();
  stopNarrationAudio();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.voice = role === 'female' ? VOICES.female : role === 'male' ? VOICES.male : VOICES.narrator;
  u.rate = role === 'narrator' ? 0.82 : 0.78;
  u.pitch = role === 'female' ? 1.05 : 0.85;
  u.onend = () => { if (onEnd) onEnd(); };
  speechSynthesis.speak(u);
}

function speakLongText(text, onEnd) {

    u.voice = VOICES.narrator;
    u.rate = 0.76;
    u.pitch = 0.85;
    u.onend = speakNext;
    u.onerror = speakNext;
    speechSynthesis.speak(u);
  };
  speakNext();
}

function synthTone(freq, dur, type, vol) {
  if (!audioOn || !audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'sine';
  o.frequency.value = freq;
  g.gain.value = vol || 0.08;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + dur);
}

function synthMorseTick() {
  synthTone(880, 0.04, 'square', 0.06);

function synthFootstep() {

function playSfxOnce(key) {

  initAudio();
  const src = SFX_MP3[key];

  let a = sfxCache[key + '_once'];
  if (!a) {
    a = new Audio(src);
    sfxCache[key + '_once'] = a;
  }
  a.currentTime = 0;
  a.volume = key === 'dog' ? 0.55 : 0.4;
  a.play().catch(() => {});
}

function playLoopSfx(key, vol) {
  if (!audioOn) return null;
  initAudio();
  const src = SFX_MP3[key];
  if (!src) return null;
  let a = sfxCache[key + '_loop'];
  if (!a) {
    a = new Audio(src);
    a.loop = true;
    sfxCache[key + '_loop'] = a;
  }
  a.volume = vol;
  a.currentTime = 0;
  a.play().catch(() => {});
  return a;
}

  document.getElementById('choiceModalTitle').textContent = s.choiceTitle;
  document.getElementById('choiceModalPrompt').innerHTML = s.choicePrompt;
  const box = document.getElementById('choiceModalBtns');
  box.innerHTML = '';
  s.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-modal-btn';
    btn.innerHTML = '<span class="opt">' + c.label + '.</span>' + c.text;
    btn.onclick = () => handleChoice(c);
    box.appendChild(btn);
  });
  document.getElementById('choiceModal').classList.add('show');
}

function playOpening() {
  document.getElementById('choiceModal').classList.remove('show');
  const s = getScene();
  document.getElementById('miniDialogue').textContent = '…';
  stopAllSfx();

  if (currentScene === 2) {
    startMorseTick();
    speakNarration(s.narration, () => {
      startScene2PatrolSfx();
      showChoices();
    });
    return;
  }

  speakNarration(s.narration, () => {
    if (s.dialogue && !s.dialogueInAudio) speakCharacter(s.dialogue.name, s.dialogue.text, showChoices);
    else {
      if (s.dialogue && s.dialogueInAudio && s.dialogue.speaker === 'mother') {
        showSpeechBubble('mother', s.dialogue.name, s.dialogue.text);
        document.getElementById('miniDialogue').textContent = s.dialogue.name + '："' + s.dialogue.text + '"';
      } else if (s.dialogue) {
        document.getElementById('miniDialogue').textContent = s.dialogue.name + '："' + s.dialogue.text + '"';
      }
      showChoices();
    }
  });
}

function handleChoice(c) {
  document.getElementById('choiceModal').classList.remove('show');
  hideSpeechBubble();
  clearDialogueBubbleTimer();
  if (currentScene === 2) stopAllSfx();
  pendingHiddenChapter = false;
  pendingRetry = false;
  if (autoTimer) clearTimeout(autoTimer);
  const isFinalBadge = c.success && currentScene === 3 && c.badge === '无名坚守者';
  const p = document.getElementById('resultPopup');
  p.className = 'result-popup ' + (c.success ? 'success ' : '') + 'show' + (isFinalBadge ? ' badge-together' : '');
  document.getElementById('resultIcon').textContent = isFinalBadge ? '🏅' : (c.success ? '✅' : '❌');
  document.getElementById('resultTitle').textContent = isFinalBadge ? '获得徽章' : (c.success ? '回答正确' : '回答错误');
  document.getElementById('resultDesc').textContent = c.result;
  if (isFinalBadge) awardBadge(c.badge);
  if (c.success && currentScene < 3) {
    // 答对：显示正确解释，随后跳转下一场景
    pendingNext = currentScene + 1;
    document.querySelector('.result-close').textContent = '继续 → 场景' + pendingNext;
    const after = () => { autoTimer = setTimeout(goNext, 2200); };
    if (c.speech) setTimeout(() => speakCharacter(c.speaker === 'mother' ? '婆婆' : '林迈可', c.speech, after), 400);
    else after();
  } else if (isFinalBadge) {
    pendingHiddenChapter = true;
    document.querySelector('.result-close').textContent = '继续 → 隐藏篇章';
    if (typeof playBadgeReveal === 'function') playBadgeReveal('无名坚守者');
    autoTimer = setTimeout(openHiddenChapterFromResult, 3200);
  } else {
    // 答错：显示错误解释，可重试
    pendingNext = null;
    pendingRetry = true;
    document.querySelector('.result-close').textContent = '重试';
    if (c.speech) setTimeout(() => speakCharacter(c.speaker === 'mother' ? '婆婆' : '林迈可', c.speech), 400);
  }
}

function closeResult() {
  document.getElementById('resultPopup').classList.remove('show');
  if (pendingRetry) {
    pendingRetry = false;
    setTimeout(() => showChoices(), 200);
    return;
  }
  if (pendingHiddenChapter) {
    openHiddenChapterFromResult();
    return;
  }
  if (pendingNext) goNext();
}

function goNext() {
  pendingNext = null;
  stopAllSfx();
  currentScene++;
  buildScene(currentScene, () => setTimeout(playOpening, 350));
}

function fitKitchenScale(scene) {
  const box = new THREE.Box3().setFromObject(scene);
  const sz = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(sz.x, sz.y, sz.z);
  if (maxDim < 0.05) return KITCHEN_CFG.scale;
  return (KITCHEN_CFG.targetSize / maxDim) * KITCHEN_CFG.scale;
}

function buildKitchenFallback() {
  const g = new THREE.Group();
  g.name = 'KitchenFallback';
  const mat = new THREE.MeshStandardMaterial({ color: 0x4a3828, roughness: 0.95 });
  const floor = new THREE.Mesh(new THREE.BoxGeometry(5, 0.12, 4.5), mat);
  g.add(floor);
  const stove = new THREE.Mesh(new THREE.BoxGeometry(1.3, 0.95, 0.85), new THREE.MeshStandardMaterial({ color: 0x333333 }));
  stove.position.set(0, 0.48, -1.4); g.add(stove);
  add(g);
  return new THREE.Box3().setFromObject(g);
}

function buildKitchenEnclosureWalls(roomBox) {
  const g = new THREE.Group();
  g.name = 'KitchenEnclosure';
  const ctr = roomBox.getCenter(new THREE.Vector3());
  const sz = roomBox.getSize(new THREE.Vector3());
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x4a3828, roughness: 0.96 });
  const ceilMat = new THREE.MeshStandardMaterial({ color: 0x3a3028, roughness: 0.98 });
  const T = 0.14;
  const pad = 0.06;
  const h = sz.y * 1.0;
  const midY = roomBox.min.y + h * 0.5;
  const wX = sz.x + pad * 2;
  const wZ = sz.z + pad * 2;

  if (KITCHEN_MODEL_WALL !== 'minX') {
    const left = new THREE.Mesh(new THREE.BoxGeometry(T, h, wZ), wallMat);
    left.position.set(roomBox.min.x - T * 0.5 - pad * 0.3, midY, ctr.z);
    left.castShadow = true; left.receiveShadow = true;
    g.add(left);
  }
  if (KITCHEN_MODEL_WALL !== 'maxX') {
    const right = new THREE.Mesh(new THREE.BoxGeometry(T, h, wZ), wallMat);
    right.position.set(roomBox.max.x + T * 0.5 + pad * 0.3, midY, ctr.z);
    right.castShadow = true; right.receiveShadow = true;
    g.add(right);
  }
  if (KITCHEN_MODEL_WALL !== 'minZ') {
    const back = new THREE.Mesh(new THREE.BoxGeometry(wX, h, T), wallMat);
    back.position.set(ctr.x, midY, roomBox.min.z - T * 0.5 - pad * 0.3);
    back.castShadow = true; back.receiveShadow = true;
    g.add(back);
  }
  if (KITCHEN_MODEL_WALL !== 'maxZ') {
    const front = new THREE.Mesh(new THREE.BoxGeometry(wX, h, T), wallMat);
    front.position.set(ctr.x, midY, roomBox.max.z + T * 0.5 + pad * 0.3);
    front.castShadow = true; front.receiveShadow = true;
    g.add(front);
  }

  const ceiling = new THREE.Mesh(new THREE.BoxGeometry(wX, 0.1, wZ), ceilMat);
  ceiling.position.set(ctr.x, roomBox.max.y + 0.02, ctr.z);
  ceiling.receiveShadow = true;
  g.add(ceiling);

  add(g);
  console.log('✅ 厨房围合（保留模型墙：' + KITCHEN_MODEL_WALL + '）');
}

function placeKitchenLights(roomBox) {
  if (stoveLight) scene3d.remove(stoveLight);
  const ctr = roomBox.getCenter(new THREE.Vector3());
  const sz = roomBox.getSize(new THREE.Vector3());

  add(new THREE.AmbientLight(0x3a2818, 0.38));
  add(new THREE.HemisphereLight(0xffeedd, 0x3a2a18, 0.32));

  stoveLight = new THREE.PointLight(0xff6622, 1.4, sz.length() * 1.2);
  stoveLight.position.set(ctr.x, roomBox.min.y + sz.y * 0.45, roomBox.min.z + sz.z * 0.55);
  add(stoveLight);

  const fill = new THREE.PointLight(0xffcc99, 0.65, sz.length() * 1.1);
  fill.position.set(ctr.x, roomBox.min.y + sz.y * 0.72, ctr.z);
  add(fill);
}

function getKitchenCameraTarget(roomBox) {
  const mother = actors.mother;
  const sz = roomBox.getSize(new THREE.Vector3());
  if (!mother) return null;
  return {
    lookX: mother.x,
    lookY: mother.headY * KITCHEN_CAM.lookFace,
    lookZ: mother.z,
    eyeY: mother.headY * KITCHEN_CAM.eyeRel,
    camZ: mother.z + sz.z * KITCHEN_CAM.distZ,
  };
}

function applyKitchenCamera(roomBox) {
  const t = getKitchenCameraTarget(roomBox);
  if (!t) return;
  const sz = roomBox.getSize(new THREE.Vector3());

  camera.fov = KITCHEN_CAM.fov;
  camera.near = 0.05;
  camera.far = Math.max(sz.length() * 6, 80);
  camera.updateProjectionMatrix();
  camera.position.set(t.lookX, t.eyeY, t.camZ);
  camera.lookAt(t.lookX, t.lookY, t.lookZ);

  SCENES[1].camera = { pos: [t.lookX, t.eyeY, t.camZ], look: [t.lookX, t.lookY, t.lookZ] };
  console.log('📷 场景一 · 屋内面对面', SCENES[1].camera);
}

function placePopo(popoScene, roomBox) {
  const root = new THREE.Group();
  root.name = 'PopoMain';
  const m = popoScene.clone(true);
  m.traverse(node => { node.rotation.set(0, 0, 0); });
  const rawBox = new THREE.Box3().setFromObject(m);
  const h = rawBox.getSize(new THREE.Vector3()).y;
  const kitchenH = roomBox.getSize(new THREE.Vector3()).y;
  const targetH = kitchenH * POPO_CFG.heightRatio;
  const sc = targetH / Math.max(h, 0.01);
  m.scale.set(sc, sc, sc);
  root.add(m);
  root.rotation.set(0, POPO_CFG.rotY, 0);
  root.updateMatrixWorld(true);

  const pb = new THREE.Box3().setFromObject(root);
  const ctr = roomBox.getCenter(new THREE.Vector3());
  const sz = roomBox.getSize(new THREE.Vector3());
  root.position.set(
    ctr.x + sz.x * POPO_CFG.offsetX,
    roomBox.min.y - pb.min.y - POPO_CFG.floorSink,
    roomBox.min.z + sz.z * POPO_CFG.depthZ
  );
  root.updateMatrixWorld(true);

  fixMaterials(m);
  m.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
  add(root);

  const wb = new THREE.Box3().setFromObject(root);
  registerActor('mother', {
    x: (wb.min.x + wb.max.x) / 2,
    z: (wb.min.z + wb.max.z) / 2,
    headY: wb.max.y - 0.04,
  });
  console.log('✅ 婆婆已摆放（厨房内，身高约为厨房' + Math.round(POPO_CFG.heightRatio * 100) + '%）', actors.mother);
}

function placeKitchenModel(gltfScene) {
  const root = new THREE.Group();
  root.name = 'KitchenMain';
  const m = gltfScene;
  const sc = fitKitchenScale(m);
  m.rotation.y = KITCHEN_CFG.rotY;
  m.scale.set(sc, sc, sc);
  root.add(m);
  root.updateMatrixWorld(true);

  const rawBox = new THREE.Box3().setFromObject(root);
  const rawCtr = rawBox.getCenter(new THREE.Vector3());
  root.position.set(-rawCtr.x, -rawBox.min.y, -rawCtr.z);
  root.updateMatrixWorld(true);

  fixMaterials(m);
  m.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
  add(root);
  return new THREE.Box3().setFromObject(root);
}

function loadKitchenScene(onReady) {
  setSceneLoading(true, '加载场景一 · 农家厨房…');
  scene3d.background = new THREE.Color(0x120e0a);
  scene3d.fog = new THREE.FogExp2(0x1a120c, 0.012);

  let kitchenBox = null;

  const finish = (usedGlb) => {
    placeKitchenLights(kitchenBox);
    applyKitchenCamera(kitchenBox);
    setSceneLoading(false);
    console.log(usedGlb ? '✅ 场景一厨房内景就绪' : '⚠️ 场景一 使用备用厨房');
    if (onReady) onReady(usedGlb);
  };

  const loadPopo = (roomBox, kitchenUsed) => {
    gltfLoader.load(MODEL_FILES.popo, (gltf) => {
      placePopo(gltf.scene, roomBox);
      finish(kitchenUsed);
    }, undefined, (err) => {
      console.warn('⚠️ 婆婆 glb 未找到', MODEL_FILES.popo, err);
      finish(kitchenUsed);
    });
  };

  gltfLoader.load(MODEL_FILES.kitchen, (gltf) => {
    kitchenBox = placeKitchenModel(gltf.scene);
    buildKitchenEnclosureWalls(kitchenBox);
    console.log('✅ 厨房建筑已加载', MODEL_FILES.kitchen, kitchenBox.getSize(new THREE.Vector3()));
    loadPopo(kitchenBox, true);
  }, (xhr) => {
    if (xhr.total) console.log('加载厨房…', Math.round(xhr.loaded / xhr.total * 100) + '%');
  }, (err) => {
    console.warn('⚠️ 厨房 glb 未找到，使用备用场景', MODEL_FILES.kitchen, err);
    kitchenBox = buildKitchenFallback();
    buildKitchenEnclosureWalls(kitchenBox);
    loadPopo(kitchenBox, false);
  });
}

function buildCaveProcedural() {
  const g = new THREE.Group();
  g.name = 'CaveFallback';
  const rock = new THREE.MeshStandardMaterial({ color: 0x3a3530, roughness: 1 });
  const floor = new THREE.Mesh(new THREE.BoxGeometry(5, 0.2, 5), rock);
  g.add(floor);
  const table = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.15, 0.8), new THREE.MeshStandardMaterial({ color: 0x4a4035 }));
  table.position.set(0, 0.5, 0); g.add(table);
  const radio = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.2, 0.25), new THREE.MeshStandardMaterial({ color: 0x2a2a2a, metalness: 0.3 }));
  radio.position.set(0, 0.65, 0.1); g.add(radio);
  add(g);
}

function fixMaterials(obj) {
  obj.traverse(c => {
    if (!c.isMesh) return;
    c.castShadow = true;
    c.receiveShadow = true;
    const mats = Array.isArray(c.material) ? c.material : [c.material];
    mats.forEach(mat => {
      if (!mat) return;
      mat.side = THREE.DoubleSide;
      if (mat.map) mat.map.encoding = THREE.sRGBEncoding;
      if (mat.emissive) { mat.emissive.setRGB(0, 0, 0); mat.emissiveIntensity = 0; }
      mat.needsUpdate = true;
    });
  });
}

function fitCaveScale(scene) {
  const box = new THREE.Box3().setFromObject(scene);
  const sz = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(sz.x, sz.y, sz.z);
  if (maxDim < 0.05) return CAVE_CFG.scale;
  return (CAVE_CFG.targetSize / maxDim) * CAVE_CFG.scale;
}

function placeCaveLights(roomBox, sceneNum) {
  patrolLights.forEach(l => scene3d.remove(l));
  patrolLights.length = 0;
  if (lampLight) scene3d.remove(lampLight);

  const ctr = roomBox.getCenter(new THREE.Vector3());
  const sz = roomBox.getSize(new THREE.Vector3());

  lampLight = new THREE.PointLight(sceneNum === 3 ? 0xffaa66 : 0xff8833, sceneNum === 3 ? 0.85 : 1.1, sz.length() * 0.9);
  lampLight.position.set(ctr.x, roomBox.min.y + sz.y * 0.55, ctr.z);
  add(lampLight);

  const fill = new THREE.PointLight(0x334455, 0.18, sz.length());
  fill.position.set(ctr.x - sz.x * 0.2, ctr.y, ctr.z + sz.z * 0.15);
  add(fill);

  if (sceneNum === 2) {
    [[-0.35, 0.12], [0.0, -0.2], [0.4, 0.05]].forEach(([ox, oz], i) => {
      const spot = new THREE.SpotLight(0xffffff, 0.55, sz.length() * 2.2, 0.45, 0.5);
      spot.position.set(
        ctr.x + sz.x * ox,
        roomBox.min.y + sz.y * 0.25,
        roomBox.max.z + sz.z * (0.35 + oz)
      );
      spot.target.position.set(ctr.x, ctr.y * 0.9, ctr.z - sz.z * 0.1);
      add(spot);
      add(spot.target);
      spot.userData = { phase: i * 2.1, baseX: spot.position.x, baseZ: spot.position.z };
      patrolLights.push(spot);
    });
  }
}

function applyCaveCamera(roomBox, sceneNum) {
  const ctr = roomBox.getCenter(new THREE.Vector3());
  const sz = roomBox.getSize(new THREE.Vector3());
  const eyeY = roomBox.min.y + sz.y * CAVE_CAM.eyeY;
  const camZ = roomBox.max.z + sz.z * CAVE_CAM.backZ;
  const lookY = roomBox.min.y + sz.y * CAVE_CAM.lookY;
  const lookZ = roomBox.min.z + sz.z * CAVE_CAM.lookZ;

  camera.fov = CAVE_CAM.fov;
  camera.near = 0.05;
  camera.far = Math.max(sz.length() * 6, 80);
  camera.updateProjectionMatrix();
  camera.position.set(ctr.x, eyeY, camZ);
  camera.lookAt(ctr.x, lookY, lookZ);

  SCENES[sceneNum].camera = {
    pos: [ctr.x, eyeY, camZ],
    look: [ctr.x, lookY, lookZ],
  };
  console.log('📷 山洞场景' + sceneNum + ' 全景相机', SCENES[sceneNum].camera);
}

function loadCaveScene(sceneNum, onReady) {
  setSceneLoading(true, '加载场景' + sceneNum + ' · 苏静洞…');
  scene3d.background = new THREE.Color(sceneNum === 3 ? 0x030305 : 0x050403);
  scene3d.fog = new THREE.FogExp2(sceneNum === 3 ? 0x080810 : 0x0a0806, sceneNum === 2 ? 0.018 : 0.016);
  add(new THREE.AmbientLight(sceneNum === 3 ? 0x2a2830 : 0x2a2018, sceneNum === 3 ? 0.35 : 0.4));

  const finish = (roomBox, usedGlb) => {
    caveLoaded = usedGlb;
    placeCaveLights(roomBox, sceneNum);
    applyCaveCamera(roomBox, sceneNum);
    setSceneLoading(false);
    console.log(usedGlb ? '✅ 场景' + sceneNum + ' GLB 山洞就绪' : '⚠️ 场景' + sceneNum + ' 使用备用山洞');
    if (onReady) onReady(usedGlb);
  };

  gltfLoader.load(MODEL_FILES.cave, (gltf) => {
    const root = new THREE.Group();
    root.name = 'SujingCaveMain';
    const m = gltf.scene;
    const sc = fitCaveScale(m);
    m.rotation.y = CAVE_CFG.rotY;
    m.scale.set(sc, sc, sc);
    root.add(m);
    root.updateMatrixWorld(true);

    const rawBox = new THREE.Box3().setFromObject(root);
    const rawCtr = rawBox.getCenter(new THREE.Vector3());
    root.position.set(-rawCtr.x, -rawBox.min.y, -rawCtr.z);
    root.updateMatrixWorld(true);

    fixMaterials(m);
    add(root);

    const roomBox = new THREE.Box3().setFromObject(root);
    console.log('✅ 山洞模型已加载', MODEL_FILES.cave, {
      size: roomBox.getSize(new THREE.Vector3()),
      scale: sc.toFixed(3),
    });
    finish(roomBox, true);
  }, (xhr) => {
    if (xhr.total) {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      console.log('加载山洞…', pct + '%');
    }
  }, (err) => {
    console.warn('⚠️ 山洞 glb 未找到，使用程序场景', MODEL_FILES.cave, err);
    buildCaveProcedural();
    const roomBox = new THREE.Box3(
      new THREE.Vector3(-2.5, 0, -2.5),
      new THREE.Vector3(2.5, 2.2, 2.5)
    );
    finish(roomBox, false);
  });
}

function buildCaveScene(sceneNum, onReady) {
  loadCaveScene(sceneNum, onReady);
}

function buildScene2(onReady) {
  console.log('═══ 构建场景二 · 深夜发报 ═══');
  buildCaveScene(2, onReady);
}

function buildScene3(onReady) {
  console.log('═══ 构建场景三 · 六年坚守 ═══');
  buildCaveScene(3, onReady);
}

function buildScene1(onReady) {
  console.log('═══ 构建场景一 · 假夫妻 ═══');
  loadKitchenScene(onReady);
}

function buildScene(n, onReady) {
  sceneBuilding = true;
  clearScene();
  caveLoaded = false;
  currentScene = n;
  updateUI();

  const done = () => {
    sceneBuilding = false;
    sceneReady = true;
    if (onReady) onReady();
  };

  if (n === 1) buildScene1(done);
  else if (n === 2) buildScene2(done);
  else if (n === 3) buildScene3(done);
  else buildScene1(done);
}

function initThree() {
  const c = document.getElementById('canvas-container');
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.15;
  c.appendChild(renderer.domElement);
  scene3d = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.05, 200);
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

function render() {
  requestAnimationFrame(render);
  animTick += 0.016;
  if (lampLight && currentScene >= 2) {
    lampLight.intensity = (currentScene === 2 ? 1.05 : 0.82) + Math.sin(animTick * 3.2) * 0.12;
  }
  if (stoveLight && currentScene === 1) {
    stoveLight.intensity = 1.25 + Math.sin(animTick * 2.8) * 0.18;
  }
  patrolLights.forEach(sp => {
    const d = sp.userData;
    sp.position.x = d.baseX + Math.sin(animTick * 0.9 + d.phase) * 0.45;
    sp.position.z = d.baseZ + Math.cos(animTick * 0.7 + d.phase) * 0.35;
    sp.intensity = 0.35 + Math.abs(Math.sin(animTick * 1.4 + d.phase)) * 0.35;
  });
  updateBubblePosition();
  renderer.render(scene3d, camera);
}

window.addEventListener('load', () => {
  initThree();
  render();
  document.body.addEventListener('click', () => initAudio(), { once: true });
  const params = new URLSearchParams(location.search);
  const startScene = parseInt(params.get('scene'), 10);
  const first = (startScene >= 1 && startScene <= 3) ? startScene : 1;

  if (first === 1) {
    currentScene = 1;
    updateUI();
    playPreScene1Intro(startScene1AfterIntro);
  } else {
    scene1IntroDone = true;
    buildScene(first, () => setTimeout(playOpening, 500));
  }
});
window.exitScene = exitScene;
</script>
