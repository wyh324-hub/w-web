<script type="module">

function returnToCheckin() {
  const params = new URLSearchParams(window.location.search);
  const spotId = params.get('spot') || '';
  try {
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'jiankou-scene-complete', spotId: spotId }, '*');
      return;
    }
  } catch (e) {}
  try { sessionStorage.setItem('jiankouCompletedSpot', spotId); } catch (e) {}
  window.location.href = new URL('../index.html', window.location.href).href;
}

// 茶棚关卡（guanqia.glb）— 保留 Meshy 原始贴图与材质

const INTRO_NARRATION =
  '妙峰山古香道是明清至民国时期民众朝拜妙峰山娘娘庙的主要路径，庙会始于明代，已有 400 余年历史，2008 年被列入第二批国家级非物质文化遗产名录。' +
  '现存四条主线路 —— 南道、中道、中北道、老北道，其中中北道全长约 40 华里（20 公里），是慈禧太后当年进香所走的主道。' +
  '据传该道由清光绪年间大太监刘诚印出资用石板铺砌，因造价昂贵 ——"每铺石一块就得用白银一两"—— 而被称为 "金阶"。' +
  '清末民国初期，庙会期间日进山香客达万人之多。1925 年，著名民俗学者顾颉刚以妙峰山古香道为基地，开创了中国近代民俗学野外调查的先河，留下了《妙峰山香会调查报告》等学术专著。' +
  '抗战爆发后，这条古道因位置偏僻、山林掩蔽，被八路军开辟为秘密交通线，承担传递情报、运送物资、护送人员前往根据地的重任。' +
  '法国医生贝熙业曾用自行车沿此路将药品秘密运往根据地，经海淀、温泉送到北安河附近的青纱帐，再由平西站交通员张冲等人取走，因此这条路又被后人称为自行车上的 "驼峰航线"。';

let introFinishCallback = null;
let pendingShowHiddenChapter = false;
let hiddenTypeToken = 0;
let hiddenTypeTimer = null;
let activeNarrationAudio = null;
const narrationMp3Cache = {};
let dialogueBubbleTimer = null;
let dialogueBubblePollId = null;
let actors = {};
let activeBubble = null;
const _proj = new THREE.Vector3();

const NARRATION_MP3 = {
  intro:  'audio/guxiangdao/intro.mp3',
  scene1: 'audio/guxiangdao/scene1.mp3',
  scene2: 'audio/guxiangdao/scene2.mp3',
  // 场景三无新录音，走原浏览器配音
};

function stopNarrationAudio() {
  if (activeNarrationAudio) {
    activeNarrationAudio.pause();
    activeNarrationAudio.currentTime = 0;
    activeNarrationAudio = null;
  }
}

function clearDialogueBubbleTimer() {
  if (dialogueBubbleTimer) {
    clearTimeout(dialogueBubbleTimer);
    dialogueBubbleTimer = null;
  }
  if (dialogueBubblePollId) {
    clearInterval(dialogueBubblePollId);
    dialogueBubblePollId = null;
  }
}

function registerActor(key, cfg) {
  actors[key] = { x: cfg.x, z: cfg.z, headY: cfg.headY || 1.6 };
}

function showSpeechBubble(key, name, text) {
  hideSpeechBubble();
  const layer = document.getElementById('bubble-layer');
  if (!layer || !actors[key]) return;
  const el = document.createElement('div');
  el.className = 'speech-bubble show';
  const line = (text || '').replace(/[<>&]/g, (ch) => ({ '<':'&lt;', '>':'&gt;', '&':'&amp;' }[ch]));
  el.innerHTML = '<div class="speaker-name">' + (name || '') + '</div><div class="bubble-text">' + line + '</div>';
  layer.appendChild(el);
  activeBubble = { el, key };
  updateBubblePosition();
}

function hideSpeechBubble() {
  if (activeBubble) { activeBubble.el.remove(); activeBubble = null; }
}

function revealDialogueThenChoices(dialogue, openChoices) {
  if (dialogue && dialogue.speaker && actors[dialogue.speaker]) {
    showSpeechBubble(dialogue.speaker, dialogue.name, dialogue.text);
    document.getElementById('miniDialogue').textContent = dialogue.name + '：「' + dialogue.text + '」';
    setTimeout(() => { if (openChoices) openChoices(); }, 1800);
  } else if (openChoices) {
    openChoices();
  }
}

function updateBubblePosition() {
  if (!activeBubble || !actors[activeBubble.key] || !camera) return;
  const a = actors[activeBubble.key];
  _proj.set(a.x, a.headY, a.z);
  _proj.project(camera);
  const x = (_proj.x * 0.5 + 0.5) * window.innerWidth;
  const y = (-_proj.y * 0.5 + 0.5) * window.innerHeight - 12;
  activeBubble.el.style.left = x + 'px';
  activeBubble.el.style.top = y + 'px';
}

function scheduleInAudioDialogueBubble(dialogue, dialogueAt) {
  clearDialogueBubbleTimer();
  if (!dialogue || !dialogue.speaker) return;
  const key = dialogue.speaker;
  let shown = false;
  const show = () => {
    if (shown) return;
    shown = true;
    clearDialogueBubbleTimer();
    if (activeNarrationAudio) activeNarrationAudio.removeEventListener('timeupdate', onTime);
    if (!actors[key]) return;
    showSpeechBubble(key, dialogue.name, dialogue.text);
    document.getElementById('miniDialogue').textContent = dialogue.name + '：「' + dialogue.text + '」';
  };
  const onTime = () => {
    const audio = activeNarrationAudio;
    if (audio && audio.currentTime >= dialogueAt) show();
  };
  const audio = activeNarrationAudio;
  const arm = () => {
    const at = typeof dialogueAt === 'number' ? dialogueAt : NaN;
    if (!isFinite(at) || at < 0) {
      const dur = audio && isFinite(audio.duration) ? audio.duration : 0;
      dialogueBubbleTimer = setTimeout(show, dur > 0 ? Math.max(400, dur * 1000 * 0.45) : 5000);
      return;
    }
    audio.addEventListener('timeupdate', onTime);
    dialogueBubblePollId = setInterval(() => {
      const a = activeNarrationAudio;
      if (a && a.currentTime >= at) show();
    }, 30);
  };
  if (audio) {
    if (isFinite(audio.duration) && audio.duration > 0) arm();
    else audio.addEventListener('loadedmetadata', arm, { once: true });
  }
}

function playDocAudio(key, textFallback, onEnd) {
  if (!audioOn) { if (onEnd) onEnd(); return; }
  const src = NARRATION_MP3[key];
  if (!src) {
    tts(textFallback, onEnd);
    return;
  }
  speechSynthesis.cancel();
  stopNarrationAudio();
  let audio = narrationMp3Cache[key];
  if (!audio) {
    audio = new Audio(src);
    audio.preload = 'auto';
    narrationMp3Cache[key] = audio;
  } else {
    audio.pause();
    audio.currentTime = 0;
  }
  activeNarrationAudio = audio;
  const cleanup = () => {
    audio.removeEventListener('ended', onDone);
    audio.removeEventListener('error', onFail);
  };
  const onDone = () => {
    cleanup();
    if (activeNarrationAudio === audio) activeNarrationAudio = null;
    if (onEnd) onEnd();
  };
  const onFail = () => {
    cleanup();
    if (activeNarrationAudio === audio) activeNarrationAudio = null;
    tts(textFallback, onEnd);
  };
  audio.addEventListener('ended', onDone);
  audio.addEventListener('error', onFail);
  audio.play().catch(onFail);
}

const HIDDEN_CHAPTER_SEGMENTS = [

function getScene() { return SCENES[currentScene]; }

function setSceneLoading(on, msg) {
  const el = document.getElementById('sceneLoading');
  const title = document.getElementById('loadTitle');
  const prog = document.getElementById('loadProgress');
  if (msg && title) title.textContent = msg;
  if (prog && !on) prog.textContent = '';
  el.classList.toggle('show', on);
}

function setLoadProgress(text) {
  const prog = document.getElementById('loadProgress');
  if (prog) prog.textContent = text || '';
}

function showProtocolWarning(show) {
  document.getElementById('protocolWarn').classList.toggle('show', show);
}

function updateUI() {
  const s = getScene();
  document.getElementById('topTag').textContent = '🛤️ ' + s.tag;
  document.getElementById('miniYear').textContent = s.year;
  document.getElementById('miniTitle').textContent = s.title;
  document.querySelectorAll('.scene-nav button').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.scene, 10) === currentScene);
  });
}

function purgeHandcart() {
  if (handcartRef) {
    disposeObject(handcartRef);
    scene3d.remove(handcartRef);
    const idx = sceneObjects.indexOf(handcartRef);
    if (idx >= 0) sceneObjects.splice(idx, 1);
    handcartRef = null;
  }
  for (let i = sceneObjects.length - 1; i >= 0; i--) {
    const o = sceneObjects[i];
    if (o.userData && o.userData.propType === 'handcart') {
      disposeObject(o);
      scene3d.remove(o);
      sceneObjects.splice(i, 1);
    }
  }
}

function add(obj) {
  if (currentScene === 3 && obj.userData && obj.userData.propType === 'handcart') {
    disposeObject(obj);
    return;
  }
  scene3d.add(obj);
  sceneObjects.push(obj);
}

function disposeObject(obj) {
  if (!obj) return;
  if (obj.dispose) obj.dispose();
  else if (obj.traverse) {
    obj.traverse((c) => {
      if (c.geometry) c.geometry.dispose();
      if (c.material) {
        if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
        else c.material.dispose();
      }
    });
  }
}

function clearScene() {
  purgeHandcart();
  sceneObjects.forEach(o => disposeObject(o));
  sceneObjects.length = 0;
  for (const k in actors) delete actors[k];
  hideSpeechBubble();
  clearDialogueBubbleTimer();
}

    fragmentShader: 'uniform vec3 topColor,bottomColor;uniform float offset,exponent;varying vec3 vP;void main(){float h=normalize(vP+offset).y;gl_FragColor=vec4(mix(bottomColor,topColor,max(pow(max(h,0.0),exponent),0.0)),1.0);}'

function buildMountains() {
  const g = new THREE.Group();
  const layers = [
    { n: 10, z: -42, spread: 180, hMin: 10, hMax: 22, color: 0x5a6a52 },
    { n: 12, z: -58, spread: 220, hMin: 16, hMax: 32, color: 0x4a5a48 },
    { n: 14, z: -78, spread: 260, hMin: 22, hMax: 42, color: 0x3a4a42 },
  ];
  layers.forEach((layer) => {
    for (let i = 0; i < layer.n; i++) {
      const h = layer.hMin + Math.random() * (layer.hMax - layer.hMin);
      const w = h * (1.1 + Math.random() * 0.7);
      const m = new THREE.Mesh(
        new THREE.ConeGeometry(w, h, 6),
        new THREE.MeshStandardMaterial({ color: layer.color, roughness: 1, fog: true }),
      );
      m.position.set(
        (i - layer.n / 2) * (layer.spread / layer.n) + (Math.random() - 0.5) * 12,
        h * 0.28 - 1,
        layer.z + (Math.random() - 0.5) * 14,
      );
      g.add(m);
    }
  });
  add(g);
}

function buildPathsideEarth(pathLen, pathHalfW) {
  const g = new THREE.Group();
  const earthMat = new THREE.MeshStandardMaterial({ color: 0x6a5a42, roughness: 1 });
  const dirtMat = new THREE.MeshStandardMaterial({ color: 0x5a4a35, roughness: 1 });
  const grassMat = new THREE.MeshStandardMaterial({ color: 0x4a6a38, roughness: 1 });
  const mats = [earthMat, dirtMat, grassMat];
  const centerZ = -pathLen / 2 + 5;

  [-1, 1].forEach((side) => {
    const flankW = 9;
    const strip = new THREE.Mesh(new THREE.PlaneGeometry(flankW, pathLen + 8), earthMat);
    strip.rotation.x = -Math.PI / 2;
    strip.position.set(side * (pathHalfW + flankW * 0.48), 0.03, centerZ);
    strip.receiveShadow = true;
    g.add(strip);

    for (let z = 0; z < pathLen; z += 2) {
      if (Math.random() > 0.55) continue;
      const patch = new THREE.Mesh(
        new THREE.BoxGeometry(1.2 + Math.random() * 2.5, 0.06 + Math.random() * 0.1, 1.2 + Math.random() * 2.2),
        mats[Math.floor(Math.random() * mats.length)],
      );
      patch.position.set(
        side * (pathHalfW + 1.8 + Math.random() * (flankW - 2)),
        0.05,
        -z * 0.92 + 6 + (Math.random() - 0.5) * 0.6,
      );
      g.add(patch);
    }
  });
  add(g);
}

function buildAncientPath() {
  const group = new THREE.Group();
  const stoneMat = new THREE.MeshStandardMaterial({ color: 0x8a8a7a, roughness: 0.92 });
  const darkMat = new THREE.MeshStandardMaterial({ color: 0x5a5a4a, roughness: 0.95 });
  const mossMat = new THREE.MeshStandardMaterial({ color: 0x5a6a3a, roughness: 1 });
  const PATH_LEN = 55;
  const base = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.1, PATH_LEN), darkMat);
  base.position.set(0, 0.05, -PATH_LEN / 2 + 5);
  base.receiveShadow = true;
  group.add(base);
  for (let z = 0; z < PATH_LEN; z++) {
    for (let x = -1; x <= 1; x++) {
      const stone = new THREE.Mesh(
        new THREE.BoxGeometry(0.9 + Math.random() * 0.15, 0.05 + Math.random() * 0.03, 0.6 + Math.random() * 0.1),
        Math.random() > 0.65 ? mossMat : stoneMat
      );
      stone.position.set(x * 0.95 + (Math.random() - 0.5) * 0.1, 0.1, -z * 0.92 + 6);
      stone.rotation.y = (Math.random() - 0.5) * 0.06;
      stone.castShadow = true;
      stone.receiveShadow = true;
      group.add(stone);
    }
  }
  add(group);
  buildPathsideEarth(PATH_LEN, 1.75);
}

function buildRoadsideTrees(opts = {}) {
  const g = new THREE.Group();
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x3a2510, roughness: 0.95 });
  const greens = [0x1a5c1a, 0x267326, 0x32a032, 0x3dbd3d];
  const exclude = opts.exclude;
  for (let z = 2; z < 50; z += 3) {
    for (const side of [-1, 1]) {
      if (Math.random() > 0.3) continue;
      const tx = side * (4 + Math.random() * 1.5);
      const tz = -z * 0.92 + 6;
      if (exclude) {
        if (Math.abs(tx - exclude.x) < exclude.radiusX && Math.abs(tz - exclude.z) < exclude.radiusZ) continue;
      }
      const tree = new THREE.Group();
      const h = 4 + Math.random() * 5;
      const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.22, h, 8), trunkMat);
      trunk.position.y = h / 2;
      tree.add(trunk);
      const crown = new THREE.Mesh(
        new THREE.SphereGeometry(1.2 + Math.random() * 0.8, 8, 8),
        new THREE.MeshStandardMaterial({ color: greens[Math.floor(Math.random() * greens.length)], roughness: 0.85 })
      );
      crown.position.y = h + 0.8;
      crown.scale.set(1, 1.3, 1);
      tree.add(crown);
      tree.position.set(tx, 0, tz);
      g.add(tree);
    }
  }
  add(g);
}

  [[-1.6, -11], [1.6, -11]].forEach(([x, z]) => {
    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 1.4, 8), wood);
    post.position.set(x, 0.7, z);
    g.add(post);
  });
  add(g);
  buildSoldier(-1.2, -10.5, 0.4);
  buildSoldier(0.6, -11.2, -2.6);
  buildSoldier(1.5, -10.8, -1.8);
  registerActor('soldier', { x: 0.6, z: -11.2, headY: 1.65 });
}

function buildBicycle(x, z) {
  const bike = new THREE.Group();
  const metal = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, metalness: 0.4, roughness: 0.6 });
  const frame = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.5, 0.9), metal);
  frame.position.y = 0.55;
  bike.add(frame);
  [[-0.28, 0.22], [0.28, 0.22]].forEach(([ox, oz]) => {
    const wheel = new THREE.Mesh(new THREE.TorusGeometry(0.28, 0.03, 8, 20), metal);
    wheel.rotation.y = Math.PI / 2;
    wheel.position.set(ox, 0.28, oz);
    bike.add(wheel);
  });
  const bag = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.25, 0.2), new THREE.MeshStandardMaterial({ color: 0x8a6a3a }));
  bag.position.set(0, 0.75, -0.15);
  bike.add(bag);
  bike.position.set(x, PATH_Y, z);
  bike.rotation.y = -0.5;
  add(bike);
}

function applySceneCamera(n) {
  const s = SCENES[n];
  camera.up.set(0, 1, 0);
  const cam = s.camera;
  camera.fov = n === 3 ? 50 : 48;
  camera.near = 0.05;
  camera.far = 200;
  camera.updateProjectionMatrix();
  camera.position.set(cam.pos[0], cam.pos[1], cam.pos[2]);
  camera.lookAt(cam.look[0], cam.look[1], cam.look[2]);
}

function getCheckpointCfg() {
  return { x: 0, z: -11.5, scale: 6.5, rotY: 0, groundY: PATH_Y };
}

function preloadModels() {
  const list = [
    ['soldier1', MODEL_FILES.soldier1],
    ['soldier2', MODEL_FILES.soldier2],
    ['checkpoint', MODEL_FILES.checkpoint],
    ['bethune', MODEL_FILES.bethune],
    ['handcart', MODEL_FILES.handcart],
  ];
  list.forEach(([key, url]) => {
    gltfLoader.load(url, (gltf) => {
      modelCache[key] = gltf;
      console.log('📦 预加载完成', key);
    }, undefined, (err) => console.warn('预加载失败', key, err));
  });
}

function purgeSoldiers() {
  for (let i = sceneObjects.length - 1; i >= 0; i--) {
    const o = sceneObjects[i];
    if (o.userData && o.userData.propType === 'soldier') {
      disposeObject(o);
      scene3d.remove(o);
      sceneObjects.splice(i, 1);
    }
  }
}

function placeGlbInstance(gltf, cfg, forScene, expectedLoadId, propType) {
  if (currentScene !== forScene || sceneLoadId !== expectedLoadId) return false;
  const wrap = new THREE.Group();
  if (propType) wrap.userData.propType = propType;
  const m = gltf.scene.clone(true);
  m.rotation.y = cfg.rotY || 0;
  const s = cfg.scale || 1;
  m.scale.set(s, s, s);
  wrap.add(m);
  wrap.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(wrap);
  const groundY = cfg.groundY != null ? cfg.groundY : PATH_Y;
  wrap.position.set(cfg.x, groundY - box.min.y, cfg.z);
  m.traverse((child) => {
    if (!child.isMesh) return;
    child.castShadow = true;
    child.receiveShadow = true;
    if (cfg.renderOrder) child.renderOrder = cfg.renderOrder;
  });
  add(wrap);
  return true;
}

function loadGlbProp(url, cfg, label, forScene, opts = {}) {
  const expectedScene = forScene;
  const expectedLoadId = sceneLoadId;
  const { cacheKey, propType } = opts;

  const finish = (gltf) => {
    if (placeGlbInstance(gltf, cfg, expectedScene, expectedLoadId, propType)) {
      console.log('✅', label, '已加载 [场景' + expectedScene + ']');
    }
  };

  if (cacheKey && modelCache[cacheKey]) {
    finish(modelCache[cacheKey]);
    return;
  }

  gltfLoader.load(url, (gltf) => {
    if (cacheKey) modelCache[cacheKey] = gltf;
    if (currentScene !== expectedScene || sceneLoadId !== expectedLoadId) {
      console.log('⏭️ 跳过过期模型', label);
      return;
    }
    finish(gltf);
  }, undefined, (err) => console.error('❌', label, '加载失败', err));
}

function loadCheckpoint(forScene) {
  const cfg = getCheckpointCfg();
  loadGlbProp(MODEL_FILES.checkpoint, { ...cfg, renderOrder: 2 }, '关卡模型', forScene, { cacheKey: 'checkpoint' });
}

function loadSoldiers(forScene) {
  purgeSoldiers();
  const groundY = getCheckpointCfg().groundY;
  loadGlbProp(MODEL_FILES.soldier1, {
    x: 2.1, z: -4.2, scale: 1.2, rotY: 0, groundY, renderOrder: 3,
  }, '伪军1（握枪）', forScene, { cacheKey: 'soldier1', propType: 'soldier' });
  loadGlbProp(MODEL_FILES.soldier2, {
    x: -2.1, z: -4.8, scale: 1.2, rotY: 0, groundY, renderOrder: 3,
  }, '伪军2（站岗）', forScene, { cacheKey: 'soldier2', propType: 'soldier' });
}

function ensureSoldiersLoaded() {
  if (currentScene !== 2) return;
  const n = sceneObjects.filter(o => o.userData && o.userData.propType === 'soldier').length;
  if (n < 2) loadSoldiers(2);
}

function loadBethune(forScene) {
  loadGlbProp(MODEL_FILES.bethune, {
    x: 0.4, z: 0.8, scale: 1.15, rotY: Math.PI / 2, groundY: PATH_Y, renderOrder: 3,
  }, '贝熙业医生', forScene, { cacheKey: 'bethune' });
}

function buildSceneProps(n) {
  if (n === 3) {
    purgeHandcart();
    loadCheckpoint(3);
    loadBethune(3);
    return;
  }

  if (n === 1 || n === 2) {
    purgeHandcart();
    loadHandcart(getHandcartCfg(n), n);
    if (n === 2) {
      loadCheckpoint(2);
      loadSoldiers(2);
      setTimeout(ensureSoldiersLoaded, 1200);
      setTimeout(ensureSoldiersLoaded, 3000);
    }
  }
}

function getHandcartCfg(n) {
  return { ...SCENES[n].handcart };
}

function placeHandcart(wrap) {
  purgeHandcart();
  handcartRef = wrap;
  wrap.userData.propType = 'handcart';
  add(wrap);
}

function buildProceduralHandcart(cfg) {
  const cart = new THREE.Group();
  const wood = new THREE.MeshStandardMaterial({ color: 0x7a5a3a, roughness: 0.9 });
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.85 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.35, 1.1), wood);
  body.position.y = 0.55;
  cart.add(body);
  const wheel = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.32, 0.08, 16), wheelMat);
  wheel.rotation.z = Math.PI / 2;
  wheel.position.set(0, 0.32, 0.35);
  cart.add(wheel);
  const handle = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.06, 0.7), wood);
  handle.position.set(0, 0.7, 0.75);
  handle.rotation.x = -0.35;
  cart.add(handle);
  cart.rotation.y = cfg.rotY || 0;
  cart.scale.setScalar(cfg.scale || 2);
  const groundY = cfg.groundY != null ? cfg.groundY : PATH_Y;
  cart.position.set(cfg.x, groundY, cfg.z);
  placeHandcart(cart);
}

function loadHandcart(cfg, forScene) {
  if (forScene !== 1 && forScene !== 2) return;
  if (currentScene !== forScene) return;

  const expectedScene = forScene;
  const expectedLoadId = sceneLoadId;
  const groundY = cfg.groundY != null ? cfg.groundY : PATH_Y;

  handcartLoader.load(MODEL_FILES.handcart, (gltf) => {
    if (currentScene !== expectedScene || sceneLoadId !== expectedLoadId) return;

    const wrap = new THREE.Group();
    const m = gltf.scene;
    m.rotation.y = cfg.rotY || 0;
    m.scale.set(cfg.scale, cfg.scale, cfg.scale);
    wrap.add(m);
    wrap.updateMatrixWorld(true);
    const box = new THREE.Box3().setFromObject(wrap);
    wrap.position.set(cfg.x, groundY - box.min.y, cfg.z);
    m.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
    placeHandcart(wrap);
    console.log('✅ 独轮车 [场景' + expectedScene + '] 仅一辆');
  }, undefined, () => {
    if (currentScene !== expectedScene || sceneLoadId !== expectedLoadId) return;
    buildProceduralHandcart(cfg);
  });
}

function buildOutdoorScene(n, onEnvReady) {
  buildSky();
  scene3d.background = new THREE.Color(0x6a8aaa);
  scene3d.fog = new THREE.Fog(0x8a9a8a, 25, 90);
  buildMountains();
  buildAncientPath();
  if (n === 2 || n === 3) {
    const cp = getCheckpointCfg();
    buildRoadsideTrees({ exclude: { x: cp.x, z: cp.z, radiusX: 22, radiusZ: 18 } });
  } else {
    buildRoadsideTrees();
  }

  add(new THREE.AmbientLight(0xffffff, 0.65));
  const sun = new THREE.DirectionalLight(0xffeedd, 1.0);
  sun.position.set(6, 14, 10);
  sun.castShadow = true;
  add(sun);
  const fill = new THREE.DirectionalLight(0x99bbdd, 0.4);
  fill.position.set(-5, 8, 5);
  add(fill);

  buildSceneProps(n);
  applySceneCamera(n);
  if (onEnvReady) onEnvReady();
}

function buildScene(n, onReady) {
  if (sceneBuilding) return;
  sceneBuilding = true;
  setSceneLoading(true, '加载场景' + n + ' · 古香道…');

  clearScene();
  cancelIntro();
  cancelHiddenChapter();
  sceneLoadId++;
  currentScene = n;
  updateUI();
  buildOutdoorScene(n, () => {
    sceneBuilding = false;
    sceneReady = true;
    setSceneLoading(false);
    if (onReady) onReady();
  });
}

window.switchScene = function(n) {
  if (sceneBuilding || n === currentScene) return;
  speechSynthesis.cancel();
  stopNarrationAudio();
  hideSpeechBubble();
  clearDialogueBubbleTimer();
  document.getElementById('choiceModal').classList.remove('show');
  document.getElementById('resultPopup').classList.remove('show');
  document.getElementById('narrationBar').classList.remove('show');
  pendingNext = null;
  if (autoTimer) clearTimeout(autoTimer);
  buildScene(n, () => setTimeout(() => playSceneStart(n), 400));
};

function loadBadges() {
  try { return new Set(JSON.parse(localStorage.getItem(BADGE_KEY) || '[]')); }
  catch (e) { return new Set(); }
}

function saveBadges(set) {
  try { localStorage.setItem(BADGE_KEY, JSON.stringify([...set])); } catch (e) {}
}

function awardBadge(name) {
  if (!name) return;
  const badges = loadBadges();
  badges.add(name);
  saveBadges(badges);
}

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

window.toggleAudio = function() {
  audioOn = !audioOn;
  document.getElementById('audioBtn').textContent = audioOn ? '🔊' : '🔇';
  if (!audioOn) {
    speechSynthesis.cancel();
    stopNarrationAudio();
  } else initAudio();
};

function synthClick() {
  if (!audioOn || !audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.frequency.value = 520;
  g.gain.value = 0.06;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.08);
}

function synthSuccess() {
  if (!audioOn || !audioCtx) return;
  [523, 659, 784].forEach((f, i) => {
    setTimeout(() => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.frequency.value = f;
      g.gain.value = 0.07;
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      o.connect(g);
      g.connect(audioCtx.destination);
      o.start();
      o.stop(audioCtx.currentTime + 0.2);
    }, i * 120);
  });
}

function synthFail() {
  if (!audioOn || !audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.value = 180;
  g.gain.value = 0.05;
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.35);
}

function tts(text, onEnd) {
  if (!audioOn || !text) { if (onEnd) onEnd(); return; }
  speechSynthesis.cancel();
  stopNarrationAudio();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = 0.82;
  u.pitch = 0.95;
  u.onend = () => { if (onEnd) onEnd(); };
  u.onerror = () => { if (onEnd) onEnd(); };
  speechSynthesis.speak(u);
}

function showNarration(text) {
  const bar = document.getElementById('narrationBar');
  bar.textContent = text;
  bar.classList.add('show');
}

function showChoiceModal() {
  const s = getScene();
  document.getElementById('choiceTitle').textContent = s.title + ' · 你的选择';
  document.getElementById('choicePrompt').textContent = s.prompt;
  const box = document.getElementById('choiceBtns');
  box.innerHTML = '';
  s.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-modal-btn';
    btn.innerHTML = '<span class="opt">' + c.label + '</span>' + c.text;
    btn.onclick = () => handleChoice(c);
    box.appendChild(btn);
  });
  document.getElementById('choiceModal').classList.add('show');
}

function hideChoiceModal() {
  document.getElementById('choiceModal').classList.remove('show');
}

function getHiddenCharDelay() {
  const total = HIDDEN_CHAPTER_SEGMENTS.reduce((n, s) => n + s.text.length, 0);
  const estDurationMs = (total / 3.3) * (1000 / 0.82);
  return Math.max(45, Math.min(88, Math.floor(estDurationMs / total)));
}

function startHiddenTypewriter(token) {
  const body = document.getElementById('hiddenChapterBody');
  const scrollEl = document.querySelector('.hidden-chapter-inner');
  body.innerHTML = '';
  body.classList.add('typing');

  let segIdx = 0;
  let charIdx = 0;
  let currentEl = null;
  const CHAR_MS = getHiddenCharDelay();

  function scrollToEnd() {
    if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;
  }

  function step() {
    if (token !== hiddenTypeToken) return;
    if (segIdx >= HIDDEN_CHAPTER_SEGMENTS.length) {
      body.classList.remove('typing');
      return;
    }
    const seg = HIDDEN_CHAPTER_SEGMENTS[segIdx];
    if (!currentEl) {
      currentEl = document.createElement(seg.tag);
      body.appendChild(currentEl);
    }
    if (charIdx < seg.text.length) {
      currentEl.textContent += seg.text[charIdx++];
      scrollToEnd();
      hiddenTypeTimer = setTimeout(step, CHAR_MS);
      return;
    }
    segIdx++;
    charIdx = 0;
    currentEl = null;
    hiddenTypeTimer = setTimeout(step, seg.tag === 'h4' ? CHAR_MS * 10 : CHAR_MS * 2);
  }

  hiddenTypeTimer = setTimeout(step, 400);
}

function cancelHiddenChapter() {
  speechSynthesis.cancel();
  hiddenTypeToken++;
  if (hiddenTypeTimer) {
    clearTimeout(hiddenTypeTimer);
    hiddenTypeTimer = null;
  }
  const body = document.getElementById('hiddenChapterBody');
  if (body) {
    body.classList.remove('typing');
    body.innerHTML = '';
  }
  document.getElementById('hiddenChapter').classList.remove('show');
}

function playHiddenChapter() {
  if (!loadBadges().has('古道交通员')) return;
  cancelIntro();
  speechSynthesis.cancel();
  hiddenTypeToken++;
  const token = hiddenTypeToken;
  document.getElementById('hiddenChapter').classList.add('show');
  document.getElementById('miniDialogue').textContent = '隐藏篇章讲述中…（可跳过）';
  startHiddenTypewriter(token);
  tts(HIDDEN_CHAPTER_TTS, function(){
    if (token !== hiddenTypeToken) return;
    setTimeout(function(){
      if (token !== hiddenTypeToken) return;
      cancelHiddenChapter();
      returnToCheckin();
    }, 1200);
  });
}

window.skipHiddenChapter = function() {
  // 立刻停声，马上返回打卡界面
  hiddenTypeToken++;
  speechSynthesis.cancel();
  cancelHiddenChapter();
  returnToCheckin();
};

function cancelIntro() {
  speechSynthesis.cancel();
  stopNarrationAudio();
  introFinishCallback = null;
  document.getElementById('introOverlay').classList.remove('show');
}

function finishIntro() {
  if (!introFinishCallback) return;
  const cb = introFinishCallback;
  introFinishCallback = null;
  document.getElementById('introOverlay').classList.remove('show');
  cb();
}

function playIntro(onDone) {
  introFinishCallback = onDone;
  hideChoiceModal();
  document.getElementById('narrationBar').classList.remove('show');
  document.getElementById('introText').textContent = INTRO_NARRATION;
  document.getElementById('introOverlay').classList.add('show');
  document.getElementById('miniDialogue').textContent = '古道史话讲述中…（可跳过）';
  playDocAudio('intro', INTRO_NARRATION, () => finishIntro());
}

window.skipIntro = function() {
  speechSynthesis.cancel();
  stopNarrationAudio();
  finishIntro();
};

function playSceneStart(n) {
  if (n === 1) {
    playIntro(() => playOpening());
  } else {
    cancelIntro();
    playOpening();
  }
}

function playOpening() {
  const s = getScene();
  document.getElementById('miniDialogue').textContent = '剧情讲述中…';
  document.getElementById('narrationBar').classList.remove('show');
  hideChoiceModal();
  hideSpeechBubble();
  clearDialogueBubbleTimer();
  playDocAudio('scene' + currentScene, s.narration, () => {
    if (s.dialogue && s.dialogueInAudio && s.dialogue.speaker) {
      showSpeechBubble(s.dialogue.speaker, s.dialogue.name, s.dialogue.text);
      document.getElementById('miniDialogue').textContent = s.dialogue.name + '：「' + s.dialogue.text + '」';
    } else {
      document.getElementById('miniDialogue').textContent = s.prompt;
    }
    showNarration(s.narration);
    showChoiceModal();
  });
  showNarration(s.narration);
  if (s.dialogue && s.dialogueInAudio) scheduleInAudioDialogueBubble(s.dialogue, s.dialogueAt);
}

function scheduleAutoAdvance(afterSpeech) {
  if (autoTimer) clearTimeout(autoTimer);
  autoTimer = setTimeout(() => {
    document.getElementById('resultPopup').classList.remove('show');
    if (pendingNext) {
      const next = pendingNext;
      pendingNext = null;
      buildScene(next, () => setTimeout(() => playSceneStart(next), 400));
    }
  }, afterSpeech ? 1600 : 2000);
}

function scheduleFinalToHidden() {
  if (autoTimer) clearTimeout(autoTimer);
  autoTimer = setTimeout(() => {
    document.getElementById('resultPopup').classList.remove('show');
    pendingShowHiddenChapter = false;
    if (loadBadges().has('古道交通员')) {
      playHiddenChapter();
    }
  }, 3200);
}

function handleChoice(c) {
  hideChoiceModal();
  hideSpeechBubble();
  clearDialogueBubbleTimer();
  if (autoTimer) clearTimeout(autoTimer);
  pendingNext = null;
  pendingShowHiddenChapter = false;
  synthClick();
  initAudio();

  const isFinalBadge = c.success && c.final && c.badge === '古道交通员';
  const p = document.getElementById('resultPopup');
  p.className = 'result-popup ' + (c.success ? 'success ' : '') + 'show' + (isFinalBadge ? ' badge-together' : '');
  document.getElementById('resultIcon').textContent = isFinalBadge ? '🏅' : (c.success ? '✅' : '❌');
  document.getElementById('resultTitle').textContent = isFinalBadge ? '获得徽章' : (c.success ? '回答正确' : '回答错误');
  document.getElementById('resultDesc').textContent = c.result;
  if (isFinalBadge) awardBadge(c.badge);

  if (c.success) synthSuccess();
  else synthFail();

  document.getElementById('narrationBar').classList.remove('show');
  const btn = document.querySelector('#resultPopup .result-close');

  if (c.success && currentScene < 3) {
    pendingNext = currentScene + 1;
    if (btn) btn.textContent = '继续 → 场景' + pendingNext;
    if (c.speech) {
      setTimeout(() => {
        tts(c.speech, () => scheduleAutoAdvance(true));
      }, 400);
    } else {
      scheduleAutoAdvance(false);
    }
  } else if (isFinalBadge) {
    if (btn) btn.textContent = '继续 → 隐藏篇章';
    pendingShowHiddenChapter = true;
    if (typeof playBadgeReveal === 'function') playBadgeReveal('古道交通员');
    scheduleFinalToHidden();
  } else {
    pendingRetry = true;
    if (btn) btn.textContent = '重试';
  }
}

window.closeResult = function() {
  synthClick();
  document.getElementById('resultPopup').classList.remove('show');
  const btn = document.querySelector('#resultPopup .result-close');
  if (btn) btn.textContent = '继续';
  if (pendingShowHiddenChapter) {
    pendingShowHiddenChapter = false;
    if (loadBadges().has('古道交通员')) {
      playHiddenChapter();
      return;
    }
  }
  if (pendingNext) {
    const next = pendingNext;
    pendingNext = null;
    buildScene(next, () => setTimeout(() => playSceneStart(next), 400));
    return;
  }
  if (pendingRetry) {
    pendingRetry = false;
    setTimeout(() => playSceneStart(currentScene), 300);
  }
};

function initThree() {
  const c = document.getElementById('canvas-container');
  renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = false;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 0.85;
  c.appendChild(renderer.domElement);
  scene3d = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(54, window.innerWidth / window.innerHeight, 0.1, 500);
  gltfLoader = new GLTFLoader();
  handcartLoader = new GLTFLoader();
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
}

function render() {
  requestAnimationFrame(render);
  animTick += 0.016;
  if (currentScene === 3) purgeHandcart();
  updateBubblePosition();
  renderer.render(scene3d, camera);
}

window.addEventListener('load', () => {
  if (location.protocol === 'file:') showProtocolWarning(true);
  initThree();
  preloadModels();
  render();
  document.body.addEventListener('click', () => initAudio(), { once: true });
  const params = new URLSearchParams(location.search);
  const startScene = parseInt(params.get('scene'), 10);
  const first = (startScene >= 1 && startScene <= 3) ? startScene : 1;
  buildScene(first, () => setTimeout(() => playSceneStart(first), 500));
});
</script>
