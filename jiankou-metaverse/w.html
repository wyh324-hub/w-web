  '平西情报联络站成立于1941年2月，位于涧沟村关帝庙旧址，是中共中央北方分局社会部在华北地区最早建立的情报联络机构。' +
  '在抗日战争和解放战争近十年时间里，这个站的工作从未间断，经历了钟子云、刘景平、梁波、梁克四任站长。' +

let activeNarrationAudio = null;
const narrationMp3Cache = {};
let dialogueBubbleTimer = null;
let dialogueBubblePollId = null;

function clearDialogueBubbleTimer() {
  if (dialogueBubbleTimer) {
    clearTimeout(dialogueBubbleTimer);
    dialogueBubbleTimer = null;
  }
  if (dialogueBubblePollId) {
    clearInterval(dialogueBubblePollId);
    dialogueBubblePollId = null;
  }
}

function scheduleInAudioDialogueBubble(dialogue, dialogueAt) {
  clearDialogueBubbleTimer();
  if (!dialogue || !dialogue.speaker) return;
  const key = dialogue.speaker;
  let shown = false;
  const show = () => {
    if (shown) return;
    shown = true;
    clearDialogueBubbleTimer();
    if (activeNarrationAudio) {
      activeNarrationAudio.removeEventListener('timeupdate', onTime);
    }
    if (!actors[key]) return;
    showSpeechBubble(key, dialogue.name, dialogue.text);
    document.getElementById('miniDialogue').textContent = dialogue.name + '："' + dialogue.text + '"';
  };
  const onTime = () => {
    const audio = activeNarrationAudio;
    if (!audio) return;
    if (audio.currentTime >= dialogueAt) show();
  };
  const audio = activeNarrationAudio;
  const arm = () => {
    const at = typeof dialogueAt === 'number' ? dialogueAt : NaN;
    if (!isFinite(at) || at < 0) {
      const dur = audio && isFinite(audio.duration) ? audio.duration : 0;
      dialogueBubbleTimer = setTimeout(show, dur > 0 ? Math.max(500, dur * 1000 * 0.7) : 8000);
      return;
    }
    audio.addEventListener('timeupdate', onTime);
    // 跟音频时钟同步（墙钟 setTimeout 会因缓冲/起播延迟漂移）
    dialogueBubblePollId = setInterval(() => {
      const a = activeNarrationAudio;
      if (a && a.currentTime >= at) show();
    }, 30);
  };
  if (audio) {
    if (isFinite(audio.duration) && audio.duration > 0) arm();
    else audio.addEventListener('loadedmetadata', arm, { once: true });
  }
}

function stopAllSpeech() {
  window.speechSynthesis.cancel();
  clearDialogueBubbleTimer();
  if (activeNarrationAudio) {
    activeNarrationAudio.pause();
    activeNarrationAudio.currentTime = 0;
    activeNarrationAudio = null;
  }
}

function playDocAudio(key, textFallback, onEnd, opts = {}) {
  if (!audioOn) { if (onEnd) onEnd(); return; }
  const src = NARRATION_MP3[key];
  if (!src) {
    if (opts.long) speakLongText(textFallback, onEnd);
    else tts(textFallback, 'narrator', onEnd);
    return;
  }

  stopAllSpeech();
  let audio = narrationMp3Cache[key];
  if (!audio) {
    audio = new Audio(src);
    audio.preload = 'auto';
    narrationMp3Cache[key] = audio;
  } else {
    audio.pause();
    audio.currentTime = 0;
  }
  activeNarrationAudio = audio;
  let playbackStarted = false;
  const onPlaying = () => { playbackStarted = true; };

  const cleanup = () => {
    audio.removeEventListener('ended', onDone);
    audio.removeEventListener('error', onFail);
    audio.removeEventListener('playing', onPlaying);
  };
  const onDone = () => {
    cleanup();
    if (activeNarrationAudio === audio) activeNarrationAudio = null;
    if (onEnd) onEnd();
  };
  const onFail = () => {
    cleanup();
    if (activeNarrationAudio === audio) activeNarrationAudio = null;
    if (playbackStarted) {
      if (onEnd) onEnd();
      return;
    }
    console.warn('⚠️ MP3 未找到或无法播放，改用男声旁白朗读:', src);
    if (opts.long) speakLongText(textFallback, onEnd);
    else tts(textFallback, 'narrator', onEnd);
  };

  audio.addEventListener('playing', onPlaying, { once: true });
  audio.addEventListener('ended', onDone);
  audio.addEventListener('error', onFail);
  audio.play().catch(onFail);
}

function speakLongText(text, onEnd) {
  if (!audioOn || !text) { if (onEnd) onEnd(); return; }
  window.speechSynthesis.cancel();
  const parts = text.match(/[^。！？]+[。！？]?/g) || [text];
  let i = 0;
  const speakNext = () => {
    if (hiddenChapterSkipRequested || i >= parts.length) {
      if (onEnd) onEnd();
      return;
    }
    const u = new SpeechSynthesisUtterance(parts[i++].trim());
    u.lang = 'zh-CN';
    u.voice = VOICES.narrator;
    u.rate = 0.78;
    u.pitch = 0.95;
    u.onend = speakNext;
    u.onerror = speakNext;
    window.speechSynthesis.speak(u);
  };
  speakNext();
}

const VOICES = { narrator: null, male: null, female: null };

function pickMaleVoice(vs) {
  return vs.find(v => /kangkang|yunxi|yunjian|yunfeng|liang|男|male/i.test(v.name))
    || vs.find(v => !/huihui|xiaoxiao|yaoyao|xiao|晓|女|female/i.test(v.name))
    || vs[0];
}

function pickFemaleVoice(vs) {
  const male = pickMaleVoice(vs);
  return vs.find(v => /huihui|xiaoxiao|yaoyao|晓|女|female/i.test(v.name))
    || vs.find(v => v !== male)
    || vs[0];
}

function initVoices() {
  const vs = window.speechSynthesis.getVoices().filter(v => v.lang.includes('zh'));
  if (!vs.length) return;
  VOICES.narrator = pickMaleVoice(vs);
  VOICES.male     = pickMaleVoice(vs);
  VOICES.female   = pickFemaleVoice(vs);
  voiceReady = true;
}
window.speechSynthesis.onvoiceschanged = initVoices;
initVoices();

function tts(text, role, onEnd) {
  if (!audioOn || !text) { if (onEnd) onEnd(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = /[\u4e00-\u9fa5]/.test(text) ? 'zh-CN' : 'en-US';
  if (role === 'narrator') {
    u.voice = VOICES.narrator; u.rate = 0.82; u.pitch = 0.85;
  } else if (role === 'female') {
    u.voice = VOICES.female; u.rate = 0.9; u.pitch = 1.15;
  } else {
    u.voice = VOICES.male; u.rate = 0.92; u.pitch = 1.05;
  }
  u.onend = () => { if (onEnd) onEnd(); };
  window.speechSynthesis.speak(u);
}

let audioOn = true, audioCtx = null, ambientNode = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  startAmbient();
}

function playTone(freq, dur, type='sine', vol=0.25) {
  if (!audioOn || !audioCtx) return;
  const o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function initThree() {
  const c = document.getElementById('canvas-container');
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  c.appendChild(renderer.domElement);
  scene3d = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 600);
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
  document.body.addEventListener('click', () => initAudio(), { once: true });
}

function add(obj) { scene3d.add(obj); sceneObjects.push(obj); }

function buildSky() {
  add(new THREE.Mesh(new THREE.SphereGeometry(400, 32, 32), new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      topColor: { value: new THREE.Color(0x4a7a9a) },
      bottomColor: { value: new THREE.Color(0xd8c090) },
      offset: { value: 0.35 }, exponent: { value: 0.55 }
    },
    vertexShader: 'varying vec3 vP;void main(){vec4 w=modelMatrix*vec4(position,1.0);vP=w.xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
    fragmentShader: 'uniform vec3 topColor,bottomColor;uniform float offset,exponent;varying vec3 vP;void main(){float h=normalize(vP+offset).y;gl_FragColor=vec4(mix(bottomColor,topColor,max(pow(max(h,0.0),exponent),0.0)),1.0);}'
  })));
}

// ★ 更长更连续的古香道
function buildAncientPath() {
  const group = new THREE.Group();
  const stoneMat = new THREE.MeshStandardMaterial({ color: 0x8a8a7a, roughness: 0.92 });
  const darkMat  = new THREE.MeshStandardMaterial({ color: 0x5a5a4a, roughness: 0.95 });
  const mossMat  = new THREE.MeshStandardMaterial({ color: 0x5a6a3a, roughness: 1 });
  const PATH_LEN = 55;

  // 连续路基
  const base = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.1, PATH_LEN), darkMat);
  base.position.set(0, 0.05, -PATH_LEN/2 + 5);
  base.receiveShadow = true;
  group.add(base);

  // 石板连续铺设
  for (let z = 0; z < PATH_LEN; z++) {
    for (let x = -1; x <= 1; x++) {
      const stone = new THREE.Mesh(
        new THREE.BoxGeometry(0.9+Math.random()*0.15, 0.05+Math.random()*0.03, 0.6+Math.random()*0.1),
        Math.random() > 0.65 ? mossMat : stoneMat
      );
      stone.position.set(x*0.95+(Math.random()-0.5)*0.1, 0.1, -z*0.92+6);
      stone.rotation.y = (Math.random()-0.5)*0.06;
      stone.castShadow = true; stone.receiveShadow = true;
      group.add(stone);
    }
  }

  // 两侧连续土路肩
  for (let side of [-1, 1]) {
    for (let z = 0; z < PATH_LEN; z += 1) {
      const shoulder = new THREE.Mesh(
        new THREE.BoxGeometry(2.8, 0.15+Math.random()*0.2, 1.1),
        new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 1 })
      );
      shoulder.position.set(side*3.2, 0.08, -z*0.92+6);
      group.add(shoulder);
    }
  }

  add(group);
}

// 检测 GLB 是否像站立人物（林迈可文件误导出成石阶时会被拦截）
function looksLikeCharacter(gltf) {
  const box = new THREE.Box3().setFromObject(gltf.scene);
  const s = box.getSize(new THREE.Vector3());
  return s.y > s.x * 1.05 && s.y > s.z * 1.05;
}

// ★ 加载模型：自动贴地 + 材质修正
let modelsLoaded = 0;
const MODEL_TOTAL = 3;

// 注册角色锚点（脑袋上方挂气泡）
function registerActor(key, cfg) {
  actors[key] = { x: cfg.x, z: cfg.z, headY: cfg.headY || 2.3 };
}

function loadGLB(path, cfg, opts = {}) {
  if (opts.procedural) {
    buildProfessorFigure(cfg);
    return;
  }

  gltfLoader.load(path, (gltf) => {
    if (cfg.label === '林迈可' && !looksLikeCharacter(gltf)) {
      console.warn('⚠️', path, '不是人物模型（可能是石阶/场景），已改用程序教授模型');
      buildProfessorFigure(cfg);
      return;
    }

    const wrap = new THREE.Group();
    const m = gltf.scene;
    m.rotation.order = 'YXZ';
    m.rotation.y = cfg.rotY;
    m.rotation.x = cfg.rotX || 0;
    m.scale.set(cfg.scale, cfg.scale, cfg.scale);
    wrap.add(m);
    wrap.updateMatrixWorld(true);

    const box = new THREE.Box3().setFromObject(wrap);
    const baseY = cfg.groundTo === 'path' ? PATH_Y : 0;
    const lift = (cfg.liftExtra || 0) + (cfg.yFix || 0);
    const groundY = baseY - box.min.y + lift;
    wrap.position.set(cfg.x, groundY, cfg.z);

    m.traverse(c => {
      if (!c.isMesh) return;
      c.castShadow = true;
      c.receiveShadow = true;
      const mats = Array.isArray(c.material) ? c.material : [c.material];
      mats.forEach(mat => {
        if (!mat) return;
        mat.side = THREE.DoubleSide;
        if (mat.map) mat.map.encoding = THREE.sRGBEncoding;
        if (mat.emissive) mat.emissive.setRGB(0, 0, 0);
        mat.emissiveIntensity = 0;
        mat.needsUpdate = true;
      });
    });

    add(wrap);
    if (cfg.label === '林夫人') registerActor('wife', cfg);
    else if (cfg.label === '林迈可') registerActor('linmaike', cfg);
    else if (cfg.label === '掌柜') registerActor('shopkeeper', cfg);
    modelsLoaded++;
    console.log('✅', cfg.label || path, 'y=', groundY.toFixed(2));
    if (modelsLoaded >= MODEL_TOTAL) {
      const el = document.querySelector('#loading div:last-child');
      if (el) el.textContent = '加载完成';
    }
  }, (xhr) => {
    if (xhr.total && cfg.label) {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      const el = document.querySelector('#loading div:last-child');
      if (el) el.textContent = '加载 ' + cfg.label + '… ' + pct + '%';
    }
  }, (err) => {
    console.error('❌ 加载失败', path, err);
    if (cfg.label === '林迈可') buildProfessorFigure(cfg);
    else addPlaceholder(cfg);
  });
}

// ★ 场景一：相机在模型外门口，老板在店内与第一人称水平面对面
const FUXING_CFG = { scale: 2.2, rotY: 0 };
const FUXING_BOSS_CFG = { rotY: Math.PI, targetHeight: 1.58, floorSink: 0.08 };
const FUXING_BOSS_PROC_SCALE = 0.68;

function fitBossAutoScale(scene) {
  const box = new THREE.Box3().setFromObject(scene);
  const h = box.getSize(new THREE.Vector3()).y;
  if (h < 0.05) return 2.0;
  return FUXING_BOSS_CFG.targetHeight / h;
}

function countMeshes(root) {
  let n = 0;
  root.traverse(c => { if (c.isMesh && c.geometry) n++; });
  return n;
}

function placeBossWorld(bossRoot, roomBox, shopModel) {
  const sight = getFuxingSightLine(roomBox, shopModel);
  bossRoot.traverse(c => { if (c.isMesh) c.visible = true; });
  add(bossRoot);
  bossRoot.updateMatrixWorld(true);

  const box = new THREE.Box3().setFromObject(bossRoot);
  const bc = box.getCenter(new THREE.Vector3());
  bossRoot.position.set(
    sight.lineX - bc.x,
    roomBox.min.y - box.min.y - FUXING_BOSS_CFG.floorSink,
    sight.lookZ - bc.z
  );
  bossRoot.updateMatrixWorld(true);
  bossRoot.lookAt(sight.lineX, sight.eyeY, sight.camZ);

  const wb = new THREE.Box3().setFromObject(bossRoot);
  const sz = wb.getSize(new THREE.Vector3());
  registerActor('shopkeeper', {
    x: sight.lineX,
    z: sight.lookZ,
    headY: wb.max.y - 0.05,
    label: '掌柜',
  });
  console.log('✅ laoban 已加载', {
    pos: bossRoot.position,
    size: { x: sz.x.toFixed(2), y: sz.y.toFixed(2), z: sz.z.toFixed(2) },
    camZ: sight.camZ.toFixed(2),
    lookZ: sight.lookZ.toFixed(2),
  });
  return sight;
}

function getBossPlacement(roomBox, shopModel) {
  const ctr = roomBox.getCenter(new THREE.Vector3());
  const sz = roomBox.getSize(new THREE.Vector3());
  let lineX = ctr.x;
  let lookZ = roomBox.min.z + sz.z * 0.26;

  const counterBox = findCounterBox(shopModel);
  if (counterBox) {
    lineX = counterBox.getCenter(new THREE.Vector3()).x;
    lookZ = Math.min(counterBox.min.z - 0.05, roomBox.min.z + sz.z * 0.26);
  }
  lookZ = THREE.MathUtils.clamp(lookZ, roomBox.min.z + sz.z * 0.05, roomBox.max.z - sz.z * 0.30);

  return { lineX, lookZ, floorY: roomBox.min.y };
}

function getFuxingSightLine(roomBox, shopModel) {
  const sz = roomBox.getSize(new THREE.Vector3());
  const place = getBossPlacement(roomBox, shopModel);
  return {
    lineX: place.lineX,
    eyeY: roomBox.min.y + sz.y * 0.31,
    camZ: roomBox.max.z - sz.z * 0.24,
    lookZ: place.lookZ,
  };
}
function findCounterBox(modelRoot) {
  let bestBox = null, bestScore = 0;
  const roomBox = new THREE.Box3().setFromObject(modelRoot);
  const roomSz = roomBox.getSize(new THREE.Vector3());
  modelRoot.traverse(c => {
    if (!c.isMesh || !c.visible) return;
    const n = (c.name || '').toLowerCase();
    const b = new THREE.Box3().setFromObject(c);
    const s = b.getSize(new THREE.Vector3());
    let score = 0;
    if (/counter|desk|table|柜台|bar|tai|zhuo/i.test(n)) score += 15;
    const wide = s.x > s.y * 1.0 && s.x > s.z * 0.5;
    const low = s.y > 0.25 && s.y < 2.5;
    if (wide && low) score += 9;
    if (score === 0 && wide && low) score = 7;
    if (score > 0) {
      const pc = b.getCenter(new THREE.Vector3());
      score += (1 - (pc.z - roomBox.min.z) / Math.max(roomSz.z, 0.01)) * 3;
      if (score > bestScore) { bestScore = score; bestBox = b; }
    }
  });
  return bestBox;
}

function placeBossGroup(shopGroup, roomBox, shopModel, bossRoot, localScale) {
  if (localScale) bossRoot.scale.set(localScale, localScale, localScale);
  return placeBossWorld(bossRoot, roomBox, shopModel);
}

function buildFuxingBoxCeiling(box) {
  const g = new THREE.Group();
  g.name = 'FuxingBoxCeiling';
  const min = box.min, max = box.max;
  const cx = (min.x + max.x) / 2;
  const cz = (min.z + max.z) / 2;
  const W = max.x - min.x + 0.25;
  const D = max.z - min.z + 0.25;
  const ceilMat = new THREE.MeshStandardMaterial({ color: 0x7a7068, roughness: 0.9 });
  const ceil = new THREE.Mesh(new THREE.BoxGeometry(W, 0.14, D), ceilMat);
  ceil.position.set(cx, max.y + 0.07, cz);
  ceil.receiveShadow = true;
  g.add(ceil);
  add(g);
}

function findShopkeeperNode(root) {
  let best = null, bestScore = 0;
  const roomBox = new THREE.Box3().setFromObject(root);
  const roomSz = roomBox.getSize(new THREE.Vector3());
  root.traverse(c => {
    if (!c.isMesh) return;
    const n = (c.name || '').toLowerCase();
    let score = 0;
    if (/shopkeeper|掌柜|boss|clerk|person|human|character|man|people|worker/i.test(n)) score += 12;
    const b = new THREE.Box3().setFromObject(c);
    const s = b.getSize(new THREE.Vector3());
    const h = s.y;
    const tall = h > s.x * 1.15 && h > s.z * 1.15;
    if (tall && h > 1.0 && h < 2.8) score += 6;
    if (score === 0 && tall && h > 1.35 && h < 2.4) score += 3;
    if (score > 0) {
      const pc = b.getCenter(new THREE.Vector3());
      const counterBias = 1 - (pc.z - roomBox.min.z) / Math.max(roomSz.z, 0.01);
      score += counterBias * 2;
    }
    if (score > bestScore) { bestScore = score; best = c; }
  });
  return best;
}

function hideEmbeddedShopkeeper(modelRoot) {
  const person = findShopkeeperNode(modelRoot);
  if (!person) return;
  person.traverse(c => { c.visible = false; });
  person.visible = false;
}

function fixMaterials(obj) {
  obj.traverse(c => {
    if (!c.isMesh) return;
    c.castShadow = true; c.receiveShadow = true;
    const mats = Array.isArray(c.material) ? c.material : [c.material];
    mats.forEach(mat => {
      if (!mat) return;
      mat.side = THREE.DoubleSide;
      if (mat.map) mat.map.encoding = THREE.sRGBEncoding;
      if (mat.emissive) mat.emissive.setRGB(0, 0, 0);
      mat.emissiveIntensity = 0;
      mat.needsUpdate = true;
    });
  });
}

const LIAISON_CFG = { scale: 2.0, rotY: 0 };
const LIAISON_MESSENGER_CFG = { targetHeight: 1.35, seatSink: 0.42, rotY: Math.PI };

function getLiaisonLayout(roomBox) {
  const sz = roomBox.getSize(new THREE.Vector3());
  const ctr = roomBox.getCenter(new THREE.Vector3());
  const tableTopY = roomBox.min.y + sz.y * 0.44;
  const tableZ = ctr.z - sz.z * 0.04;
  const seatY = roomBox.min.y + sz.y * 0.30;
  const chairZ = ctr.z + sz.z * 0.26;
  const docSpread = sz.x * 0.11;
  return { ctr, sz, tableTopY, tableX: ctr.x, tableZ, seatY, chairX: ctr.x, chairZ, docSpread };
}

function fitMessengerScale(scene) {
  const box = new THREE.Box3().setFromObject(scene);
  const h = box.getSize(new THREE.Vector3()).y;
  if (h < 0.05) return 1.2;
  return LIAISON_MESSENGER_CFG.targetHeight / h;
}

function buildLiaisonDocuments(layout) {
  const g = new THREE.Group();
  g.name = 'LiaisonDocuments';
  const colors = [0xc44e4e, 0x4e7ac4, 0xc4a84e];
  [-1, 0, 1].forEach((i, idx) => {
    const w = layout.docSpread * 0.72;
    const doc = new THREE.Mesh(
      new THREE.BoxGeometry(w, 0.012, w * 1.25),
      new THREE.MeshStandardMaterial({ color: colors[idx], roughness: 0.88, metalness: 0.02 })
    );
    doc.position.set(layout.tableX + i * layout.docSpread, layout.tableTopY + 0.008, layout.tableZ);
    doc.rotation.y = (idx - 1) * 0.04;
    doc.castShadow = true;
    g.add(doc);
  });
  add(g);
}

function placeLiaisonLights(roomBox, layout) {

function buildLiaisonDarkExterior(roomBox) {

function placeMessengerOnChair(messengerRoot, layout) {
  messengerRoot.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(messengerRoot);
  const bc = box.getCenter(new THREE.Vector3());
  messengerRoot.position.set(
    layout.chairX - bc.x,
    layout.seatY - box.min.y - LIAISON_MESSENGER_CFG.seatSink,
    layout.chairZ - bc.z
  );
  messengerRoot.rotation.y = LIAISON_MESSENGER_CFG.rotY;
  messengerRoot.updateMatrixWorld(true);
  messengerRoot.lookAt(layout.tableX, layout.tableTopY, layout.tableZ);
  add(messengerRoot);
}

function applyLiaisonCamera(roomBox, layout) {
  const eyeY = layout.seatY + layout.sz.y * 0.22;

  const lookY = layout.tableTopY + 0.02;
  camera.fov = 52;
  camera.updateProjectionMatrix();
  camera.position.set(layout.chairX, eyeY, camZ);
  camera.lookAt(layout.tableX, lookY, layout.tableZ);
  SCENES[2].camera = {

function clearScene() {
  sceneObjects.forEach(o => scene3d.remove(o));
  sceneObjects.length = 0;
  modelsLoaded = 0;
  for (const k in actors) delete actors[k];
}

function buildScene(n) {
  clearScene();
  if (n === 1) {
    buildScene1();
  } else {
    camera.fov = 48;
    camera.updateProjectionMatrix();
    if (n === 2) buildScene2();
    else buildScene3();
    if (n !== 2) {
      const cam = SCENES[n].camera;
      camera.position.set(cam.pos[0], cam.pos[1], cam.pos[2]);
      camera.lookAt(cam.look[0], cam.look[1], cam.look[2]);
    }
  }
  sceneReady = true;
}

function handleChoice(c) {
  hideChoiceModal();
  hideSpeechBubble();
  clearDialogueBubbleTimer();
  clearAutoAdvance();
  pendingNextScene = null;
  pendingHiddenChapter = false;
  pendingRetry = false;
  sfxClick();
  const isFinalBadge = c.success && currentScene === 3 && c.badge === '情报尖兵';
  const p = document.getElementById('resultPopup');
  p.className = 'result-popup ' + (c.success ? 'success ' : '') + 'show' + (isFinalBadge ? ' badge-together' : '');
  document.getElementById('resultIcon').textContent = isFinalBadge ? '🏅' : (c.success ? '✅' : '❌');
  document.getElementById('resultTitle').textContent = isFinalBadge ? '获得徽章' : (c.success ? '回答正确' : '回答错误');
  document.getElementById('resultDesc').textContent = c.result;
  if (isFinalBadge) awardBadge(c.badge);
  if (c.success) sfxSuccess(); else sfxFail();
  document.getElementById('narrationBar').classList.remove('show');

  const btn = document.querySelector('#resultPopup .result-close');

  if (c.success && currentScene < 3) {
    // 答对：显示正确解释，随后进入下一场景
    pendingNextScene = currentScene + 1;
    if (btn) btn.textContent = '继续 → 场景' + pendingNextScene;
    if (c.speech) {
      const sp = c.speaker || 'shopkeeper';
      const nm = sp === 'linmaike' ? '林迈可' : sp === 'wife' ? '林夫人' : '掌柜';
      setTimeout(() => speakCharacter(sp, nm, c.speech, () => scheduleAutoAdvance(true)), 400);
    } else {
      scheduleAutoAdvance(false);
    }
  } else if (isFinalBadge) {
    pendingHiddenChapter = true;
    if (btn) btn.textContent = '继续 → 隐藏篇章';
    if (typeof playBadgeReveal === 'function') playBadgeReveal('情报尖兵');
    clearAutoAdvance();
    autoAdvanceTimer = setTimeout(advanceToHiddenChapter, 3200);
  } else {
    // 答错：显示错误解释，可重试
    pendingRetry = true;
    if (btn) btn.textContent = '重试';
    if (c.speech) {
      const sp = c.speaker || 'shopkeeper';
      const nm = sp === 'linmaike' ? '林迈可' : sp === 'wife' ? '林夫人' : '掌柜';
      setTimeout(() => speakCharacter(sp, nm, c.speech), 400);
    }
  }
}

function closeResult() {
  sfxClick();
  document.getElementById('resultPopup').classList.remove('show');
  const btn = document.querySelector('#resultPopup .result-close');
  if (btn) btn.textContent = '继续';
  if (pendingRetry) {
    pendingRetry = false;
    setTimeout(() => showChoiceModal(), 200);
    return;
  }
  if (pendingHiddenChapter) {
    advanceToHiddenChapter();
    return;
  }
  if (pendingNextScene) advanceToNextScene();
}

function render() {
  requestAnimationFrame(render);
  updateBubblePosition();
  renderer.render(scene3d, camera);
}

window.addEventListener('load', () => {
  initThree();
  updateSceneUI();
  buildScene(1);
  render();
  setTimeout(() => {
    document.getElementById('loading').style.display = 'none';
    setTimeout(() => {
      if (!introPlayed) playIntroSequence();
      else playOpeningSequence();
    }, 500);
  }, 1200);
});
window.exitScene = exitScene;
