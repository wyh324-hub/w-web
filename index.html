<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>信仰的见证 · 元宇宙红色打卡</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== 全局重置 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            background: #1c2838;
            font-family: 'Noto Serif SC', 'Songti SC', serif;
            overflow: hidden;
            margin: 0; padding: 0;
        }

        /* ===== 主容器（打卡页面） ===== */
        .app-container {
            width: 100vw; height: 100vh;
            background: transparent;
            padding: 1.5vh 1.5vw 2vh;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            margin: 0;
            transition: opacity 0.5s ease;
        }
        .app-container.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* ===== 山景背景：妙峰晨雾 ===== */
        .mountain-bg {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .mountain-bg .sky {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 45% at 72% 18%, rgba(255, 196, 120, 0.55) 0%, transparent 55%),
                radial-gradient(ellipse 50% 35% at 28% 28%, rgba(255, 230, 190, 0.28) 0%, transparent 50%),
                linear-gradient(180deg,
                    #2a3d55 0%,
                    #4a6580 22%,
                    #7a94a8 42%,
                    #c4b8a0 62%,
                    #d8c4a8 78%,
                    #b8a890 100%);
        }
        .mountain-bg .sun-glow {
            position: absolute;
            top: 8%;
            right: 18%;
            width: min(28vw, 220px);
            height: min(28vw, 220px);
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(255, 220, 150, 0.95) 0%,
                rgba(255, 180, 90, 0.45) 28%,
                rgba(255, 140, 60, 0.12) 55%,
                transparent 72%);
            animation: sun-breathe 8s ease-in-out infinite;
            filter: blur(2px);
        }
        @keyframes sun-breathe {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.08); opacity: 1; }
        }
        .mountain-bg .cloud-band {
            position: absolute;
            left: -10%;
            width: 120%;
            height: 18%;
            background: linear-gradient(180deg,
                transparent 0%,
                rgba(255, 248, 240, 0.18) 40%,
                rgba(255, 245, 235, 0.35) 55%,
                transparent 100%);
            filter: blur(12px);
            animation: cloud-drift 28s linear infinite;
        }
        .mountain-bg .cloud-band.c1 { top: 22%; animation-duration: 32s; opacity: 0.7; }
        .mountain-bg .cloud-band.c2 { top: 38%; animation-duration: 40s; animation-direction: reverse; opacity: 0.45; height: 14%; }
        @keyframes cloud-drift {
            0% { transform: translateX(0); }
            100% { transform: translateX(6%); }
        }
        .mountain-bg .ridge {
            position: absolute;
            left: 0;
            width: 100%;
            height: 48%;
            bottom: 0;
        }
        .mountain-bg .ridge svg {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            display: block;
        }
        .mountain-bg .ridge.r1 { height: 42%; opacity: 0.55; }
        .mountain-bg .ridge.r2 { height: 50%; opacity: 0.75; }
        .mountain-bg .ridge.r3 { height: 58%; }
        .mountain-bg .mist {
            position: absolute;
            left: -5%;
            width: 110%;
            height: 22%;
            bottom: 12%;
            background: linear-gradient(180deg,
                transparent 0%,
                rgba(232, 226, 214, 0.35) 35%,
                rgba(220, 210, 195, 0.55) 60%,
                rgba(200, 190, 175, 0.25) 100%);
            filter: blur(18px);
            animation: mist-sway 14s ease-in-out infinite;
        }
        .mountain-bg .mist.m2 {
            bottom: 0;
            height: 28%;
            background: linear-gradient(180deg,
                transparent 0%,
                rgba(40, 28, 22, 0.15) 40%,
                rgba(28, 20, 16, 0.45) 100%);
            animation-delay: -4s;
            animation-duration: 18s;
        }
        @keyframes mist-sway {
            0%, 100% { transform: translateX(-2%) scaleY(1); opacity: 0.85; }
            50% { transform: translateX(3%) scaleY(1.08); opacity: 1; }
        }
        .mountain-bg .grain {
            position: absolute;
            inset: 0;
            opacity: 0.07;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 180px 180px;
            mix-blend-mode: overlay;
        }
        .mountain-bg .embers {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }
        .mountain-bg .ember {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: rgba(255, 220, 160, 0.75);
            box-shadow: 0 0 6px rgba(255, 180, 80, 0.6);
            animation: ember-rise linear infinite;
        }
        .mountain-bg .ember:nth-child(1) { left: 12%; bottom: 8%; animation-duration: 11s; animation-delay: 0s; }
        .mountain-bg .ember:nth-child(2) { left: 28%; bottom: 5%; width: 2px; height: 2px; animation-duration: 14s; animation-delay: -3s; }
        .mountain-bg .ember:nth-child(3) { left: 55%; bottom: 10%; animation-duration: 12s; animation-delay: -6s; }
        .mountain-bg .ember:nth-child(4) { left: 72%; bottom: 6%; width: 2px; height: 2px; animation-duration: 15s; animation-delay: -2s; }
        .mountain-bg .ember:nth-child(5) { left: 88%; bottom: 12%; animation-duration: 13s; animation-delay: -8s; }
        .mountain-bg .ember:nth-child(6) { left: 40%; bottom: 4%; width: 2px; height: 2px; animation-duration: 16s; animation-delay: -5s; }
        @keyframes ember-rise {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            12% { opacity: 0.8; }
            100% { transform: translateY(-70vh) translateX(18px); opacity: 0; }
        }

        .content {
            position: relative;
            z-index: 2;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 0.5vh 0 1vh;
            flex-shrink: 0;
        }
        .title {
            font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
            font-size: clamp(16px, 2.8vh, 34px);
            font-weight: 400;
            letter-spacing: 0.12em;
            color: #f5efe4;
            background: rgba(28, 22, 18, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 0.45vh 1.8vw 0.45vh 0.55vw;
            border-radius: 40px;
            border: 1px solid rgba(232, 200, 140, 0.35);
            box-shadow: 0 8px 28px rgba(12, 18, 28, 0.25);
            display: flex;
            align-items: center;
            gap: 0.7vw;
        }
        .title-icon {
            width: clamp(28px, 4.2vh, 44px);
            height: clamp(28px, 4.2vh, 44px);
            flex-shrink: 0;
            display: block;
        }

        /* ===== 路线图 ===== */
        .route-map {
            position: relative;
            flex: 1;
            min-height: 0;
            margin: 0.2vh 0 0.6vh;
            padding: 1vh 1vw 1.2vh;
            background: rgba(18, 24, 32, 0.28);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 2.5vw;
            border: 1px solid rgba(255, 236, 210, 0.22);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.12),
                0 12px 40px rgba(12, 18, 28, 0.28);
            display: flex;
            flex-direction: column;
        }
        .route-svg-wrapper {
            flex: 1;
            width: 100%;
            min-height: 0;
            position: relative;
        }
        #routeCanvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 2vw;
            cursor: pointer;
        }

        /* ===== 卡号绑定（地图顶部） ===== */
        .card-bind-bar {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.6vw 1vw;
            margin: 0 0 0.6vh;
            padding: 0.7vh 1vw;
            background: rgba(18, 24, 32, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 200, 140, 0.28);
            border-radius: 12px;
        }
        .card-bind-bar label {
            font-size: clamp(11px, 1.5vh, 16px);
            color: #e8d8c0;
            white-space: nowrap;
        }
        .card-bind-bar input {
            flex: 1;
            min-width: 120px;
            max-width: 220px;
            padding: 0.45vh 0.8vw;
            border-radius: 8px;
            border: 1px solid rgba(232, 200, 140, 0.35);
            background: rgba(255, 255, 255, 0.1);
            color: #f5efe4;
            font-size: clamp(12px, 1.6vh, 16px);
            outline: none;
        }
        .card-bind-bar input::placeholder { color: rgba(240, 230, 210, 0.45); }
        .card-bind-bar input:focus {
            border-color: rgba(232, 160, 80, 0.7);
            background: rgba(255, 255, 255, 0.14);
        }
        .card-bind-btn {
            padding: 0.45vh 1.2vw;
            border-radius: 8px;
            border: 1px solid rgba(200, 80, 50, 0.55);
            background: linear-gradient(145deg, #8B0000, #5A0A00);
            color: #f5ede8;
            font-size: clamp(11px, 1.5vh, 15px);
            cursor: pointer;
            white-space: nowrap;
        }
        .card-bind-btn:hover { filter: brightness(1.08); }
        .card-bind-btn.secondary {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.22);
        }
        .card-bound-info {
            width: 100%;
            font-size: clamp(10px, 1.35vh, 14px);
            color: #c8b090;
        }
        .card-bound-info strong { color: #e8c070; font-weight: 600; }
        .card-bound-info.unbound { color: rgba(240, 200, 160, 0.65); }

        /* ===== 打卡进度条（地图底部） ===== */
        .checkin-progress {
            flex-shrink: 0;
            margin: 0.4vh 0 0;
            padding: 0.8vh 1vw 0.9vh;
            background: rgba(18, 24, 32, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(232, 200, 140, 0.22);
            border-radius: 12px;
        }
        .checkin-progress-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.55vh;
            font-size: clamp(11px, 1.45vh, 15px);
            color: #e8d8c0;
        }
        .checkin-progress-head .count {
            color: #e8c070;
            font-weight: 600;
        }
        .checkin-progress-track {
            display: flex;
            gap: 0.45vw;
            height: clamp(8px, 1.2vh, 12px);
        }
        .checkin-progress-seg {
            flex: 1;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: background 0.35s ease, border-color 0.35s ease;
        }
        .checkin-progress-seg.done {
            background: linear-gradient(90deg, #cc3300, #e07030);
            border-color: rgba(232, 160, 80, 0.55);
            box-shadow: 0 0 8px rgba(200, 60, 30, 0.35);
        }
        .checkin-progress-hint {
            margin-top: 0.45vh;
            font-size: clamp(9px, 1.25vh, 13px);
            color: rgba(240, 230, 210, 0.65);
        }

        /* ===== 名称标签（锚在每个圆点正上方） ===== */
        .label-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }
        .point-label {
            position: absolute;
            transform: translate(-50%, -100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.3vh 0.75vw;
            background: rgba(40, 15, 10, 0.88);
            backdrop-filter: blur(4px);
            border-radius: 8px;
            border: 1px solid #c07050;
            white-space: nowrap;
            font-size: clamp(9px, 1.35vh, 16px);
            pointer-events: none;
            margin-top: -4px;
        }
        .point-label .label-name {
            font-size: clamp(9px, 1.35vh, 16px);
            color: #f0e8e0;
            font-weight: 500;
        }
        .point-label.visited {
            background: rgba(200, 60, 30, 0.9);
            border-color: #cc3300;
        }
        .point-label.visited .label-name { color: #1f0a00; }

        /* ===== 地图点位链接（点击在新标签页打开独立场景页） ===== */
        .point-link-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 6;
            pointer-events: none;
        }
        .point-link {
            position: absolute;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            pointer-events: auto;
            cursor: pointer;
            text-decoration: none;
            color: transparent;
            background: transparent;
            border: none;
            padding: 0;
        }
        .point-link:focus-visible {
            outline: 2px solid #e8c070;
            outline-offset: 2px;
        }
        a.stamp-item {
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: inherit;
        }

        /* ===== 底部操作（已改底部导航） ===== */
        .hint-text {
            flex-shrink: 0;
            text-align: center;
            margin: 0.4vh 0 0.2vh;
            font-size: clamp(10px, 1.4vh, 18px);
            color: #f0e6d4;
            text-shadow: 0 1px 8px rgba(20, 16, 12, 0.45);
            opacity: 0.9;
        }

        /* ===== 页面切换 ===== */
        .page-panel {
            display: none;
            flex: 1;
            min-height: 0;
            flex-direction: column;
            overflow: hidden;
        }
        .page-panel.active {
            display: flex;
        }
        .page-scroll {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 0.4vh 0.4vw 1vh;
            -webkit-overflow-scrolling: touch;
        }
        .page-heading {
            font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
            font-size: clamp(18px, 2.6vh, 30px);
            font-weight: 400;
            letter-spacing: 0.08em;
            color: #f5efe4;
            text-shadow: 0 2px 12px rgba(12, 18, 28, 0.35);
            margin: 0.4vh 0 1vh;
        }
        .page-sub {
            font-size: clamp(11px, 1.5vh, 18px);
            color: rgba(240, 230, 210, 0.82);
            margin-bottom: 1.2vh;
        }

        /* 我的集章 - 列表示 */
        .stamp-list {
            display: flex;
            flex-direction: column;
            gap: 0.8vh;
            background: rgba(18, 24, 32, 0.42);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 236, 210, 0.2);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 10px 32px rgba(12, 18, 28, 0.25);
        }
        .stamp-item {
            display: flex;
            align-items: center;
            gap: 1.2vw;
            padding: 1.3vh 1.4vw;
            border-bottom: 1px solid rgba(255, 236, 210, 0.1);
            background: transparent;
            border-radius: 0;
        }
        .stamp-item:last-child {
            border-bottom: none;
        }
        .stamp-check {
            width: clamp(22px, 3.2vh, 28px);
            height: clamp(22px, 3.2vh, 28px);
            border-radius: 6px;
            border: 2px solid rgba(232, 200, 140, 0.55);
            background: rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: transparent;
            font-size: clamp(12px, 1.8vh, 18px);
        }
        .stamp-item.got .stamp-check {
            background: #cc3300;
            border-color: #e8a030;
            color: #fff;
        }
        .stamp-badge {
            width: clamp(34px, 5vh, 46px);
            height: clamp(34px, 5vh, 46px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(14px, 2vh, 22px);
            font-weight: 700;
            flex-shrink: 0;
            background: #3a2818;
            color: #f0e0c8;
            border: 2px solid rgba(232, 180, 100, 0.45);
        }
        .stamp-item.got .stamp-badge {
            background: #cc3300;
            border-color: #e8a030;
            color: #1f0a00;
        }
        .stamp-info { flex: 1; min-width: 0; }
        .stamp-name {
            font-size: clamp(13px, 1.9vh, 22px);
            font-weight: 600;
            color: #f5efe4;
        }
        .stamp-status {
            font-size: clamp(11px, 1.4vh, 16px);
            color: rgba(220, 210, 190, 0.75);
            margin-top: 0.2vh;
        }
        .stamp-item.got .stamp-status { color: #f0c070; font-weight: 600; }

        /* 兑换商城 */
        .mall-points {
            display: inline-flex;
            align-items: center;
            gap: 0.5vw;
            background: #8B0000;
            color: #f7f0e8;
            padding: 0.5vh 1.2vw;
            border-radius: 40px;
            font-size: clamp(12px, 1.8vh, 20px);
            font-weight: 600;
            border: 1px solid #C06040;
            margin-bottom: 1.2vh;
        }
        .mall-points strong {
            color: #e8a030;
            font-size: 1.1em;
        }
        .mall-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1vh 1vw;
        }
        .mall-card {
            background: rgba(18, 24, 32, 0.48);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 236, 210, 0.2);
            border-radius: 14px;
            padding: 1.2vh 1vw 1.4vh;
            display: flex;
            flex-direction: column;
            gap: 0.6vh;
            box-shadow: 0 8px 24px rgba(12, 18, 28, 0.22);
        }
        .mall-emoji {
            font-size: clamp(28px, 4.5vh, 48px);
            text-align: center;
            line-height: 1.2;
        }
        .mall-name {
            font-size: clamp(13px, 1.8vh, 20px);
            font-weight: 600;
            color: #f5efe4;
            text-align: center;
        }
        .mall-cost {
            font-size: clamp(11px, 1.4vh, 16px);
            color: #f0c070;
            text-align: center;
        }
        .mall-btn {
            margin-top: 0.4vh;
            background: #8B0000;
            color: #f7f0e8;
            border: 1px solid #C06040;
            border-radius: 40px;
            padding: 0.7vh 0;
            font-size: clamp(12px, 1.6vh, 18px);
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 0.25vh 0 #2D0A00;
        }
        .mall-btn:active {
            transform: translateY(0.2vh);
            box-shadow: 0 0.1vh 0 #2D0A00;
        }
        .mall-btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .mall-coming-soon {
            flex: 1;
            min-height: 40vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.2vh;
            background: rgba(18, 24, 32, 0.42);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 236, 210, 0.2);
            border-radius: 16px;
            padding: 4vh 4vw;
            text-align: center;
        }
        .mall-coming-soon .soon-icon {
            font-size: clamp(36px, 6vh, 56px);
            opacity: 0.85;
        }
        .mall-coming-soon .soon-title {
            font-family: 'ZCOOL XiaoWei', 'Noto Serif SC', serif;
            font-size: clamp(20px, 3vh, 32px);
            color: #f5efe4;
            letter-spacing: 0.12em;
        }
        .mall-coming-soon .soon-desc {
            font-size: clamp(12px, 1.7vh, 18px);
            color: rgba(240, 230, 210, 0.75);
            line-height: 1.6;
        }

        /* 个人中心 */
        .profile-card {
            display: flex;
            align-items: center;
            gap: 1.4vw;
            padding: 1.6vh 1.5vw;
            background: rgba(18, 24, 32, 0.48);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 236, 210, 0.2);
            border-radius: 16px;
            margin-bottom: 1.4vh;
            box-shadow: 0 8px 24px rgba(12, 18, 28, 0.22);
        }
        .profile-avatar {
            width: clamp(52px, 8vh, 72px);
            height: clamp(52px, 8vh, 72px);
            border-radius: 50%;
            background: linear-gradient(145deg, #c41e3a, #6B0000);
            border: 2px solid #e8a030;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f7e6b0;
            font-size: clamp(22px, 3.5vh, 36px);
            flex-shrink: 0;
        }
        .profile-name {
            font-size: clamp(16px, 2.4vh, 26px);
            font-weight: 700;
            color: #f5efe4;
        }
        .profile-meta {
            font-size: clamp(11px, 1.5vh, 18px);

            margin-top: 0.3vh;
        }
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8vw;
            margin-bottom: 1.4vh;

        .stat-box {
            text-align: center;
            padding: 1.4vh 0.5vw;
            background: rgba(18, 24, 32, 0.48);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);

            border-radius: 12px;

        .stat-num {

            font-weight: 700;
            color: #f0c070;
        }
        .stat-label {
            font-size: clamp(10px, 1.3vh, 15px);
            color: rgba(220, 210, 190, 0.75);
            margin-top: 0.2vh;
        }
        .wall-panel {
            background: rgba(18, 24, 32, 0.48);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 236, 210, 0.2);
            border-radius: 14px;
            padding: 1.2vh 1.3vw 1.4vh;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 8px 24px rgba(12, 18, 28, 0.22);
        }
        .wall-panel:active {
            background: rgba(28, 34, 42, 0.65);
        }
        .wall-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1vh;
        }
        .wall-title {
            font-size: clamp(14px, 2vh, 22px);
            font-weight: 700;
            color: #f5efe4;
            display: flex;
            align-items: center;
            gap: 0.6vw;
        }
        .wall-title i { color: #e8a030; }
        .wall-hint {
            font-size: clamp(10px, 1.3vh, 15px);
            color: #f0c070;
            font-weight: 600;
        }
        .wall-list {
            display: flex;
            flex-direction: column;
            gap: 0.8vh;
            max-height: 28vh;
            overflow-y: auto;
        }
        .wall-empty {
            font-size: clamp(12px, 1.5vh, 17px);
            color: rgba(220, 210, 190, 0.7);
            text-align: center;
            padding: 1.5vh 0;

        .wall-msg {
            background: rgba(255, 248, 240, 0.08);
            border-radius: 10px;
            padding: 0.9vh 1vw;

        .wall-msg-text {
            font-size: clamp(12px, 1.6vh, 18px);

            word-break: break-word;

            font-size: clamp(9px, 1.2vh, 13px);
            color: rgba(200, 190, 170, 0.65);
            margin-top: 0.35vh;
        }

        /* ===== 底部导航 ===== */
        .bottom-nav {
            flex-shrink: 0;
            display: flex;
            align-items: stretch;
            justify-content: space-around;
            background: rgba(18, 24, 32, 0.72);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 236, 210, 0.18);
            border-radius: 18px;
            margin-top: 0.6vh;
            padding: 0.5vh 0.4vw;
            box-shadow: 0 8px 28px rgba(8, 12, 20, 0.35);
        }
        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.25vh;
            padding: 0.7vh 0.3vw;
            background: transparent;
            border: none;
            color: rgba(210, 200, 180, 0.65);
            cursor: pointer;
            border-radius: 12px;
            transition: color 0.2s, background 0.2s;
        }
        .nav-item i {
            font-size: clamp(16px, 2.4vh, 26px);
        }
        .nav-item span {
            font-size: clamp(9px, 1.2vh, 14px);
            font-weight: 500;
        }
        .nav-item.active {
            color: #f0d090;
            background: rgba(196, 30, 58, 0.38);
        }
        .nav-item:active {
            background: rgba(196, 30, 58, 0.25);
        }

        @media (max-width: 480px) {
            .point-label { min-width: 12vw; }
            .card-bind-bar input { max-width: none; width: 100%; }
        }
    </style>
</head>

                    <path d="M24 10.5l2.4 7.2h7.6l-6.1 4.5 2.3 7.3L24 25.2l-6.2 4.3 2.3-7.3-6.1-4.5h7.6z"
                          fill="#f7e6b0" stroke="#d4a020" stroke-width="0.6" stroke-linejoin="round"/>

<script>
    // ================================================================
    // 第一部分：打卡页面逻辑（路线图 + 卡号绑定 + 进度条）
    // ================================================================

    const TOTAL_SPOTS = 5;
    const BOUND_CARD_KEY = 'jiankou_bound_card_v1';
    const PROGRESS_PREFIX = 'jiankou_card_progress_v1_';

    const SCENE_BASE = './jiankou-metaverse/';

    const checkpoints = [
        { id: 1, name: '平西情报联络站', x: 30, y: 55, labelX: 30, labelY: 42, visited: false, scene: SCENE_BASE + 'w.html' },
        { id: 2, name: '苏静山洞', x: 42, y: 40, labelX: 42, labelY: 30, visited: false, scene: SCENE_BASE + 'sujing.html' },
        { id: 3, name: '古香道', x: 58, y: 48, labelX: 58, labelY: 38, visited: false, scene: SCENE_BASE + 'guxiangdao.html' },
        { id: 4, name: '初心广场', x: 66, y: 62, labelX: 66, labelY: 54, visited: false, scene: SCENE_BASE + 'chuxin.html' },
        { id: 5, name: '英雄山', x: 50, y: 72, labelX: 50, labelY: 82, visited: false, scene: SCENE_BASE + 'yingxiongshan.html' }
    ];

    const canvas = document.getElementById('routeCanvas');
    const ctx = canvas.getContext('2d');
    const labelOverlay = document.getElementById('labelOverlay');
    const pointLinkOverlay = document.getElementById('pointLinkOverlay');
    const stampList = document.getElementById('stampList');
    const cardNumberInput = document.getElementById('cardNumberInput');
    const cardBindBtn = document.getElementById('cardBindBtn');
    const cardUnbindBtn = document.getElementById('cardUnbindBtn');
    const cardBoundInfo = document.getElementById('cardBoundInfo');
    const progressCountEl = document.getElementById('progressCount');
    const progressTotalEl = document.getElementById('progressTotal');
    const progressTrack = document.getElementById('progressTrack');
    const progressHint = document.getElementById('progressHint');
    const symbols = ['①', '②', '③', '④', '⑤'];
    let exchangeTotal = 0;
    const wallMessages = [];
    let boundCardId = '';
    let mapDrawSize = { W: 0, H: 0 };

    function getVisitedCount() {
        return checkpoints.filter(p => p.visited).length;
    }

    function normalizeCardId(raw) {
        return String(raw || '').trim().replace(/\s+/g, '');
    }

    function progressStorageKey(cardId) {
        return PROGRESS_PREFIX + cardId;
    }

    function loadCardProgress(cardId) {
        const visitedIds = new Set();
        if (!cardId) return visitedIds;
        try {
            const raw = localStorage.getItem(progressStorageKey(cardId));
            const list = raw ? JSON.parse(raw) : [];
            if (Array.isArray(list)) list.forEach((id) => visitedIds.add(Number(id)));
        } catch (e) { /* ignore */ }
        return visitedIds;
    }

    function saveCardProgress(cardId) {
        if (!cardId) return;
        const ids = checkpoints.filter(p => p.visited).map(p => p.id);
        try {
            localStorage.setItem(progressStorageKey(cardId), JSON.stringify(ids));
        } catch (e) { /* ignore */ }
    }

    function applyProgressToCheckpoints(visitedIds) {
        checkpoints.forEach((p) => {
            p.visited = visitedIds.has(p.id);
        });
    }

    function updateProgressBar() {
        if (!progressCountEl || !progressTrack) return;
        const count = getVisitedCount();
        progressCountEl.textContent = String(count);
        progressTotalEl.textContent = String(TOTAL_SPOTS);
        progressTrack.innerHTML = checkpoints.map((p) =>
            `<div class="checkin-progress-seg${p.visited ? ' done' : ''}" title="${p.name}"></div>`
        ).join('');
        const next = checkpoints.find(p => !p.visited);
        if (!boundCardId) {
            progressHint.textContent = '请先绑定身份卡号 · 绑定后点击链接在新页面打开场景';
        } else if (!next) {
            progressHint.textContent = '本卡已集满 5 枚徽章';
        } else {
            progressHint.textContent = '已打卡 ' + count + ' / ' + TOTAL_SPOTS + ' · 点击链接在新页面打开场景';
        }
    }

    function updateCardBindUI() {
        if (boundCardId) {
            cardNumberInput.value = boundCardId;
            cardNumberInput.disabled = true;
            cardBindBtn.hidden = true;
            cardUnbindBtn.hidden = false;
            cardBoundInfo.classList.remove('unbound');
            cardBoundInfo.innerHTML = '当前身份 <strong>' + boundCardId.replace(/</g, '&lt;') + '</strong> · 进度与本卡绑定';
        } else {
            cardNumberInput.disabled = false;
            cardBindBtn.hidden = false;
            cardUnbindBtn.hidden = true;
            cardBoundInfo.classList.add('unbound');
            cardBoundInfo.textContent = '卡号为身份标识 · 绑定后点击链接在新页面打开场景';
        }
        updateProgressBar();
    }

    function bindCard() {
        const id = normalizeCardId(cardNumberInput.value);
        if (!id) {
            alert('请输入卡号后再绑定');
            cardNumberInput.focus();
            return;
        }
        if (id.length < 4) {
            alert('卡号至少 4 位');
            cardNumberInput.focus();
            return;
        }
        boundCardId = id;
        try { localStorage.setItem(BOUND_CARD_KEY, boundCardId); } catch (e) { /* ignore */ }
        applyProgressToCheckpoints(loadCardProgress(boundCardId));
        updateCardBindUI();
        updateBadge();
        drawRoute();
    }

    function unbindCard() {
        if (boundCardId) saveCardProgress(boundCardId);
        boundCardId = '';
        try { localStorage.removeItem(BOUND_CARD_KEY); } catch (e) { /* ignore */ }
        applyProgressToCheckpoints(new Set());
        cardNumberInput.value = '';
        updateCardBindUI();
        updateBadge();
        drawRoute();
    }

    function restoreBoundCard() {
        try {
            const saved = localStorage.getItem(BOUND_CARD_KEY);
            if (saved) {
                boundCardId = normalizeCardId(saved);
                applyProgressToCheckpoints(loadCardProgress(boundCardId));
            }
        } catch (e) { /* ignore */ }
        updateCardBindUI();
    }

    cardBindBtn.addEventListener('click', bindCard);
    cardUnbindBtn.addEventListener('click', unbindCard);
    cardNumberInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') bindCard();
    });

    function renderStampList() {
        stampList.innerHTML = checkpoints.map((p, i) => {
            const got = p.visited;
            const href = buildSpotUrl(p);
            return `<a class="stamp-item${got ? ' got' : ''}" href="${href}" target="_blank" rel="noopener noreferrer" data-spot-id="${p.id}">
                <div class="stamp-check" aria-checked="${got}" role="checkbox">${got ? '✓' : ''}</div>
                <div class="stamp-badge">${symbols[i]}</div>
                <div class="stamp-info">
                    <div class="stamp-name">${p.name}</div>
                    <div class="stamp-status">${got ? '已集章 · 点击链接打开场景' : '点击链接在新页面打开场景'}</div>
                </div>
            </a>`;
        }).join('');
        stampList.querySelectorAll('a.stamp-item').forEach(el => {
            el.addEventListener('click', function(e) {
                const id = Number(this.dataset.spotId);
                const spot = checkpoints.find(p => p.id === id);
                if (!spot) return;
                if (!handleSpotLinkClick(e, spot)) return;
                this.href = buildSpotUrl(spot);
            });
        });
    }

    function renderWallList() {
        const wallList = document.getElementById('wallList');
        if (!wallMessages.length) {
            wallList.innerHTML = '<div class="wall-empty">还没有留言，点这里写下你的感言吧</div>';
            return;
        }
        wallList.innerHTML = wallMessages.map(m => `
            <div class="wall-msg">
                <div class="wall-msg-text">${m.text}</div>
                <div class="wall-msg-time">${m.time}</div>
            </div>
        `).join('');
    }

    function updateProfileStats() {
        document.getElementById('statVisited').textContent = getVisitedCount();
        document.getElementById('statExchanges').textContent = exchangeTotal;
        renderWallList();
    }

    function updateBadge() {
        renderStampList();
        updateProfileStats();
        updateProgressBar();
    }

    function switchPage(page) {
        document.querySelectorAll('.page-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        const panel = document.getElementById('page-' + page);
        const nav = document.querySelector(`.nav-item[data-page="${page}"]`);
        if (panel) panel.classList.add('active');
        if (nav) nav.classList.add('active');
        if (page === 'map') setTimeout(drawRoute, 60);
        if (page === 'bookmark') renderStampList();
        if (page === 'profile') updateProfileStats();
    }

    document.getElementById('bottomNav').addEventListener('click', function(e) {
        const item = e.target.closest('.nav-item');
        if (!item) return;
        switchPage(item.dataset.page);
    });

    document.getElementById('wallPanel').addEventListener('click', function() {
        const text = prompt('写下你的留言：');
        if (text === null) return;
        const trimmed = text.trim();
        if (!trimmed) {
            alert('留言不能为空');
            return;
        }
        const now = new Date();
        const time = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
        const safe = trimmed.replace(/</g, '&lt;').replace(/>/g, '&gt;');
        wallMessages.unshift({ text: safe, time });
        renderWallList();
    });

    function drawRoute() {
        const container = canvas.parentElement;
        const rect = container.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        const W = Math.floor(rect.width - 4);
        const H = Math.floor(rect.height - 4);
        if (W <= 0 || H <= 0) return;

        mapDrawSize = { W, H };
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
        ctx.clearRect(0, 0, W, H);

        const radius = Math.max(10, Math.min(18, W * 0.04, H * 0.05));
        const points = checkpoints;
        const n = points.length;

        ctx.lineWidth = Math.max(2, Math.min(4, W * 0.008));
        ctx.strokeStyle = '#8B2500';
        ctx.setLineDash([]);
        for (let i = 0; i < n; i++) {
            const j = (i + 1) % n;
            const p1 = points[i],
                p2 = points[j];
            const x1 = (p1.x / 100) * W,
                y1 = (p1.y / 100) * H;
            const x2 = (p2.x / 100) * W,
                y2 = (p2.y / 100) * H;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }
        ctx.lineWidth = Math.max(1, Math.min(2, W * 0.005));
        ctx.strokeStyle = '#cc6040';
        ctx.setLineDash([Math.max(4, W * 0.015), Math.max(5, W * 0.018)]);
        for (let i = 0; i < n; i++) {
            const j = (i + 1) % n;
            const p1 = points[i],
                p2 = points[j];
            const x1 = (p1.x / 100) * W,
                y1 = (p1.y / 100) * H;
            const x2 = (p2.x / 100) * W,
                y2 = (p2.y / 100) * H;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }
        ctx.setLineDash([]);

        points.forEach((p, index) => {
            const x = (p.x / 100) * W;
            const y = (p.y / 100) * H;
            const isVisited = p.visited;

            const glowRadius = radius * 2.4;
            const grd = ctx.createRadialGradient(x, y, 0, x, y, glowRadius);
            if (isVisited) {
                grd.addColorStop(0, 'rgba(200, 60, 30, 0.3)');
                grd.addColorStop(1, 'rgba(200, 60, 30, 0)');
            } else {
                grd.addColorStop(0, 'rgba(139, 0, 0, 0.15)');
                grd.addColorStop(1, 'rgba(139, 0, 0, 0)');
            }
            ctx.beginPath();
            ctx.arc(x, y, glowRadius, 0, Math.PI * 2);
            ctx.fillStyle = grd;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(x, y, radius + 2, 0, Math.PI * 2);
            ctx.strokeStyle = isVisited ? '#cc3300' : '#8B2500';
            ctx.lineWidth = Math.max(1.5, Math.min(2.5, W * 0.007));
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = isVisited ? '#cc3300' : '#6B1A00';
            ctx.fill();
            ctx.strokeStyle = isVisited ? '#8B2500' : '#2D0A00';
            ctx.lineWidth = Math.max(1, Math.min(2, W * 0.005));
            ctx.stroke();

            // 圆点内保留 ①②③④⑤ 序号
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = isVisited ? '#1f0a00' : '#ffffff';
            ctx.font = `bold ${Math.max(12, Math.min(20, radius * 1.3))}px sans-serif`;
            ctx.fillText(symbols[index] || String(index + 1), x, y + 0.5);
        });

        // 每个圆点正上方：地点名称小框（与画布同一坐标系，不会堆到左下角）
        labelOverlay.innerHTML = '';
        pointLinkOverlay.innerHTML = '';
        const labelGap = radius + Math.max(10, H * 0.016);
        const linkSize = Math.max(radius * 2.4, 28);
        checkpoints.forEach((p, index) => {
            const x = (p.x / 100) * W;
            const y = (p.y / 100) * H;

            const link = document.createElement('a');
            link.className = 'point-link';
            link.href = buildSpotUrl(p);
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.title = '在新页面打开：' + p.name;
            link.setAttribute('aria-label', '在新页面打开：' + p.name);
            link.style.left = x + 'px';
            link.style.top = y + 'px';
            link.style.width = linkSize + 'px';
            link.style.height = linkSize + 'px';
            link.addEventListener('click', function(e) {
                handleSpotLinkClick(e, p);
            });
            pointLinkOverlay.appendChild(link);

            const label = document.createElement('div');
            label.className = 'point-label' + (p.visited ? ' visited' : '');
            label.style.left = x + 'px';
            label.style.top = (y - labelGap) + 'px';
            label.innerHTML = `<span class="label-name">${p.name}</span>`;
            labelOverlay.appendChild(label);
        });
    }

    function buildSpotUrl(spot) {
        if (!spot || !spot.scene) return '#';
        const url = new URL(spot.scene, window.location.href);
        url.searchParams.set('spot', String(spot.id));
        url.searchParams.set('from', 'checkin');
        if (boundCardId) url.searchParams.set('card', boundCardId);
        return url.href;
    }

    function handleSpotLinkClick(e, spot) {
        if (!spot) {
            e.preventDefault();
            return false;
        }
        if (!boundCardId) {
            e.preventDefault();
            alert('请先绑定身份卡号');
            cardNumberInput.focus();
            return false;
        }
        e.currentTarget.href = buildSpotUrl(spot);
        return true;
    }

    let resizeTimer = null;

    function scheduleDraw() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(drawRoute, 80);
    }
    window.addEventListener('resize', scheduleDraw);
    window.addEventListener('orientationchange', () => setTimeout(drawRoute, 300));

    // ================================================================
    // 场景跳转：点击链接在新标签页打开五个独立场景网页
    // ①w.html  ②sujing.html  ③guxiangdao.html  ④chuxin.html  ⑤yingxiongshan.html
    // ================================================================

    function markSpotDone(spotId) {
        const id = Number(spotId);
        const spot = checkpoints.find(p => p.id === id);
        if (!spot || spot.visited) {
            updateBadge();
            drawRoute();
            return;
        }
        spot.visited = true;
        if (boundCardId) saveCardProgress(boundCardId);
        updateBadge();
        drawRoute();
        if (getVisitedCount() === TOTAL_SPOTS) {
            setTimeout(() => {
                alert('🎉 恭喜集满5枚徽章！\n你已解锁全部点位！\n可兑换当地助农产品！');
            }, 400);
        }
    }

    window.jiankouGetBoundCard = function () { return boundCardId || ''; };
    window.jiankouGetCheckpoints = function () {
        return checkpoints.map(p => ({ id: p.id, name: p.name, visited: !!p.visited }));
    };

    (function consumeCompletedSpot() {
        try {
            const done = sessionStorage.getItem('jiankouCompletedSpot');
            if (done) {
                sessionStorage.removeItem('jiankouCompletedSpot');
                markSpotDone(done);
            }
        } catch (err) { /* ignore */ }
    })();

    // ================================================================
    // 初始化打卡页面
    // ================================================================
    restoreBoundCard();
    updateBadge();
    setTimeout(drawRoute, 120);
    setTimeout(drawRoute, 400);

</script>

</body>
